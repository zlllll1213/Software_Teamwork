include:
  - docker-compose.db.yml

services:
  auth-postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: auth_system
      POSTGRES_USER: auth_app
      POSTGRES_PASSWORD: auth_app_dev
      TZ: Asia/Shanghai
    ports:
      - "${AUTH_POSTGRES_PORT:-5434}:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
      - ../auth/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_app -d auth_system"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "${GATEWAY_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  auth:
    build:
      context: ../auth
      dockerfile: ${AUTH_DOCKERFILE:-Dockerfile}
      args:
        IMAGE_REGISTRY_PREFIX: ${DOCKER_IMAGE_REGISTRY_PREFIX:-}
        GOPROXY: ${GO_DOCKER_GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GO_DOCKER_GOSUMDB:-sum.golang.org}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    environment:
      AUTH_HTTP_ADDR: :8081
      AUTH_DATABASE_URL: postgres://auth_app:auth_app_dev@auth-postgres:5432/auth_system?sslmode=disable
      AUTH_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      AUTH_SESSION_TTL: ${AUTH_SESSION_TTL:-24h}
      AUTH_BOOTSTRAP_ADMIN_USERNAME: ${AUTH_BOOTSTRAP_ADMIN_USERNAME:-admin}
      AUTH_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${AUTH_BOOTSTRAP_ADMIN_DISPLAY_NAME:-系统管理员}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:-admin123456}
    ports:
      - "${AUTH_HTTP_PORT:-8081}:8081"
    depends_on:
      auth-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

  qa:
    build:
      context: .
      dockerfile: ${QA_DOCKERFILE:-Dockerfile}
      args:
        IMAGE_REGISTRY_PREFIX: ${DOCKER_IMAGE_REGISTRY_PREFIX:-}
        GOPROXY: ${GO_DOCKER_GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GO_DOCKER_GOSUMDB:-sum.golang.org}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    environment:
      QA_HTTP_ADDR: :8084
      QA_DATABASE_URL: postgres://qa_app:qa_app_dev@postgres:5432/qa_system?sslmode=disable
      MODEL_ID: ${MODEL_ID:-deepseek-chat}
      AI_GATEWAY_URL: ${QA_AI_GATEWAY_URL:-http://ai-gateway:8086/internal/v1/chat/completions}
      AI_GATEWAY_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      AI_GATEWAY_TOKEN_HEADER: X-Service-Token
      MCP_TRANSPORT: ${MCP_TRANSPORT:-disabled}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      QA_CONFIG_ENCRYPTION_KEY: ${QA_CONFIG_ENCRYPTION_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
      AGENT_WORKDIR: /workspace
      AGENT_ENABLE_COMMAND_TOOL: ${AGENT_ENABLE_COMMAND_TOOL:-false}
    ports:
      - "${QA_HTTP_PORT:-8084}:8084"
    volumes:
      - qa_agent_workspace:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8084/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

  gateway:
    build:
      context: ../gateway
      dockerfile: ${GATEWAY_DOCKERFILE:-Dockerfile}
      args:
        IMAGE_REGISTRY_PREFIX: ${DOCKER_IMAGE_REGISTRY_PREFIX:-}
        GOPROXY: ${GO_DOCKER_GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GO_DOCKER_GOSUMDB:-sum.golang.org}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-}
    environment:
      GATEWAY_HTTP_ADDR: :8080
      GATEWAY_AUTH_BASE_URL: http://auth:8081
      GATEWAY_KNOWLEDGE_BASE_URL: ${GATEWAY_KNOWLEDGE_BASE_URL:-http://knowledge:8083}
      GATEWAY_QA_BASE_URL: http://qa:8084
      GATEWAY_DOCUMENT_BASE_URL: ${GATEWAY_DOCUMENT_BASE_URL:-http://document:8085}
      GATEWAY_AI_GATEWAY_BASE_URL: ${GATEWAY_AI_GATEWAY_BASE_URL:-http://ai-gateway:8086}
      GATEWAY_REDIS_ADDR: redis:6379
      GATEWAY_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    depends_on:
      auth:
        condition: service_healthy
      qa:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  auth_pg_data:
  qa_agent_workspace:
