name: Docker and Deploy Checks

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/**/Dockerfile*'
      - 'services/**/.dockerignore'
      - 'services/**/docker-compose*.yml'
      - 'services/**/docker-compose*.yaml'
      - 'deploy/**'
      - '.github/workflows/docker-deploy-checks.yml'
  push:
    branches: [develop]
    paths:
      - 'services/**/Dockerfile*'
      - 'services/**/.dockerignore'
      - 'services/**/docker-compose*.yml'
      - 'services/**/docker-compose*.yaml'
      - 'deploy/**'
      - '.github/workflows/docker-deploy-checks.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      dockerfiles: ${{ steps.changed.outputs.dockerfiles }}
      has-dockerfiles: ${{ steps.changed.outputs.has-dockerfiles }}
      compose-files: ${{ steps.changed.outputs.compose-files }}
      has-compose-files: ${{ steps.changed.outputs.has-compose-files }}
    steps:
      - name: Detect Docker and Compose changes
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const currentBuildableDockerfiles = new Set([
              'deploy/Dockerfile.migrate',
              'services/ai-gateway/Dockerfile',
              'services/auth/Dockerfile',
              'services/document/Dockerfile',
              'services/document/Dockerfile.migrate',
              'services/file/Dockerfile',
              'services/gateway/Dockerfile',
              'services/knowledge/Dockerfile',
              'services/qa/Dockerfile',
              'services/qa/Dockerfile.host',
              'services/qa/Dockerfile.migrate',
            ]);
            const qaComposeFile = 'services/qa/docker-compose.yml';
            const qaDbComposeFile = 'services/qa/docker-compose.db.yml';
            const knownComposeFiles = new Set([
              'deploy/docker-compose.yml',
              'services/document/docker-compose.yml',
              qaDbComposeFile,
              qaComposeFile,
            ]);
            const composeFilePattern =
              /^(deploy|services\/[^/]+)\/.*docker-compose[^/]*\.ya?ml$/u;
            const buildableDockerfilePattern =
              /^(deploy|services\/[^/]+)\/Dockerfile(?:\.(?:host|migrate))?$/u;
            const rootDeployComposeFile = 'deploy/docker-compose.yml';
            const rootDeployComposeDependencyPattern =
              /^deploy\/(?:\.env\.example|postgres\/init\/.+|seeds\/.+)$/u;
            const workflowPath = '.github/workflows/docker-deploy-checks.yml';

            const changedFiles = new Set();

            if (context.eventName === 'pull_request') {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              for (const file of files) {
                changedFiles.add(file.filename);
              }
            } else if (context.eventName === 'push') {
              const response = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${context.payload.before}...${context.payload.after}`,
              });
              for (const file of response.data.files || []) {
                changedFiles.add(file.filename);
              }
            }

            const files = [...changedFiles];
            const workflowChanged = files.includes(workflowPath);
            const dockerfiles = new Set();

            const addBuildableDockerfilesForService = (service) => {
              const prefix = `services/${service}/`;
              for (const dockerfile of currentBuildableDockerfiles) {
                if (dockerfile.startsWith(prefix)) {
                  dockerfiles.add(dockerfile);
                }
              }
            };

            if (workflowChanged) {
              for (const dockerfile of currentBuildableDockerfiles) {
                dockerfiles.add(dockerfile);
              }
            } else {
              for (const file of files) {
                if (
                  buildableDockerfilePattern.test(file) &&
                  currentBuildableDockerfiles.has(file)
                ) {
                  dockerfiles.add(file);
                  continue;
                }

                const dockerignoreMatch = file.match(/^services\/([^/]+)\/\.dockerignore$/u);
                if (dockerignoreMatch) {
                  addBuildableDockerfilesForService(dockerignoreMatch[1]);
                }
              }
            }
            const composeFiles = new Set();
            if (workflowChanged) {
              for (const composeFile of knownComposeFiles) {
                composeFiles.add(composeFile);
              }
            } else {
              for (const file of files) {
                if (
                  composeFilePattern.test(file) &&
                  knownComposeFiles.has(file)
                ) {
                  composeFiles.add(file);
                  if (file === qaDbComposeFile) {
                    composeFiles.add(qaComposeFile);
                  }
                  continue;
                }

                if (rootDeployComposeDependencyPattern.test(file)) {
                  composeFiles.add(rootDeployComposeFile);
                }
              }
            }

            core.info(`Changed files: ${files.join(', ') || '(none)'}`);
            core.info(`Dockerfiles: ${[...dockerfiles].join(', ') || '(none)'}`);
            core.info(`Compose files: ${[...composeFiles].join(', ') || '(none)'}`);
            core.setOutput('dockerfiles', JSON.stringify([...dockerfiles].sort()));
            core.setOutput(
              'has-dockerfiles',
              dockerfiles.size > 0 ? 'true' : 'false'
            );
            core.setOutput('compose-files', JSON.stringify([...composeFiles].sort()));
            core.setOutput(
              'has-compose-files',
              composeFiles.size > 0 ? 'true' : 'false'
            );

  docker-build:
    needs: detect
    if: needs.detect.outputs.has-dockerfiles == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJSON(needs.detect.outputs.dockerfiles) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go for host-binary Dockerfile
        if: matrix.dockerfile == 'services/qa/Dockerfile.host'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: services/qa/go.mod

      - name: Prepare host-binary Dockerfile input
        if: matrix.dockerfile == 'services/qa/Dockerfile.host'
        run: |
          mkdir -p services/qa/bin
          cd services/qa
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o bin/qa-server ./cmd/server

      - name: Build Dockerfile
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          dockerfile="$DOCKERFILE"
          context="$(dirname "$dockerfile")"
          docker build --file "$dockerfile" "$context"

  compose-config:
    needs: detect
    if: needs.detect.outputs.has-compose-files == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compose-file: ${{ fromJSON(needs.detect.outputs.compose-files) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        env:
          COMPOSE_FILE: ${{ matrix.compose-file }}
        run: |
          compose_file="$COMPOSE_FILE"
          if [ "$compose_file" = "deploy/docker-compose.yml" ]; then
            docker compose -f "$compose_file" --env-file deploy/.env.example config --quiet
            docker compose -f "$compose_file" --env-file deploy/.env.example --profile ai config --quiet
          else
            docker compose -f "$compose_file" config --quiet
          fi
