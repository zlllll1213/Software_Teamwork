name: Go Migrations

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/**/migrations/**'
      - 'services/**/README.md'
      - '.github/workflows/go-migrations.yml'
      - 'docs/architecture/technology-decisions.md'
  push:
    branches: [develop]
    paths:
      - 'services/**/migrations/**'
      - 'services/**/README.md'
      - '.github/workflows/go-migrations.yml'
      - 'docs/architecture/technology-decisions.md'

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth, document, file, knowledge, qa]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Check migration filenames
        shell: bash
        run: |
          shopt -s nullglob
          migrations=(migrations/*.sql)
          if [ ${#migrations[@]} -eq 0 ]; then
            echo "No SQL migrations found for ${{ matrix.service }}" >&2
            exit 1
          fi

          for migration in "${migrations[@]}"; do
            name="$(basename "$migration")"
            if [[ ! "$name" =~ ^[0-9]{4}_[a-z0-9_]+\.sql$ ]]; then
              echo "Migration filename must use an ordered prefix and snake_case summary: $name" >&2
              exit 1
            fi
          done

      - name: Apply migrations
        run: go run github.com/pressly/goose/v3/cmd/goose@v3.27.1 -dir migrations postgres "$DATABASE_URL" up