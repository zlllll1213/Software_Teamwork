  /api/v1/report-files:
    get:
      tags:
      - report-generation
      summary: List report files
      operationId: listReportFiles
      x-owner-service: document
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
