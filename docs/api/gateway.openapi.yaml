openapi: 3.0.3
info:
  title: Power Knowledge Platform Gateway API
  version: 0.1.0
  license:
    name: Unspecified
    url: https://github.com/Sakayori-Iroha-168/Software_Teamwork
  description: |
    Frontend-facing API contract for the gateway service.
    This is a contract-first skeleton for parallel frontend and backend development.
servers:
  - url: /
    description: Gateway root
security:
  - bearerAuth: []
tags:
  - name: health
    description: Gateway process and readiness checks.
  - name: auth
    description: Authentication and current user APIs owned by auth service.
  - name: knowledge
    description: Knowledge base and retrieval APIs owned by knowledge service.
  - name: documents
    description: Document upload, metadata, processing status, chunks, and downloads.
  - name: chat
    description: QA chat APIs owned by qa service.
  - name: reports
    description: Report generation APIs owned by document service.
  - name: admin
    description: Administration overview APIs.
paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness check
      operationId: getHealthz
      security: []
      responses:
        "200":
          description: Gateway process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "429":
          $ref: "#/components/responses/Error"
  /readyz:
    get:
      tags: [health]
      summary: Readiness check
      operationId: getReadyz
      security: []
      responses:
        "200":
          description: Gateway is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "429":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"

  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register a user
      operationId: registerUser
      security: []
      x-owner-service: auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Login
      operationId: login
      security: []
      x-owner-service: auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Logout
      operationId: logout
      x-owner-service: auth
      responses:
        "204":
          description: Logout succeeded.
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Get current user
      operationId: getCurrentUser
      x-owner-service: auth
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Error"

  /api/v1/knowledge-bases:
    get:
      tags: [knowledge]
      summary: List knowledge bases
      operationId: listKnowledgeBases
      x-owner-service: knowledge
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/Keyword"
        - name: type
          in: query
          schema:
            type: string
          description: Optional knowledge base type filter.
      responses:
        "200":
          description: Knowledge base list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags: [knowledge]
      summary: Create knowledge base
      operationId: createKnowledgeBase
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeBaseRequest"
      responses:
        "201":
          description: Knowledge base created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseResponse"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/knowledge-bases/{knowledgeBaseId}:
    parameters:
      - $ref: "#/components/parameters/KnowledgeBaseId"
    get:
      tags: [knowledge]
      summary: Get knowledge base
      operationId: getKnowledgeBase
      x-owner-service: knowledge
      responses:
        "200":
          description: Knowledge base details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseResponse"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [knowledge]
      summary: Update knowledge base
      operationId: updateKnowledgeBase
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKnowledgeBaseRequest"
      responses:
        "200":
          description: Knowledge base updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [knowledge]
      summary: Delete knowledge base
      operationId: deleteKnowledgeBase
      x-owner-service: knowledge
      responses:
        "204":
          description: Knowledge base deleted.
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/knowledge-bases/{knowledgeBaseId}/documents:
    parameters:
      - $ref: "#/components/parameters/KnowledgeBaseId"
    get:
      tags: [documents]
      summary: List documents in a knowledge base
      operationId: listKnowledgeBaseDocuments
      x-owner-service: knowledge
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DocumentStatus"
      responses:
        "200":
          description: Document list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "404":
          $ref: "#/components/responses/Error"
    post:
      tags: [documents]
      summary: Upload a document to a knowledge base
      operationId: uploadKnowledgeBaseDocument
      x-owner-service: file
      description: |
        Gateway exposes the upload workflow. File service owns raw upload and metadata;
        knowledge service owns ingestion and indexing state.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Document accepted for processing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/documents/{documentId}:
    parameters:
      - $ref: "#/components/parameters/DocumentId"
    get:
      tags: [documents]
      summary: Get document metadata and processing status
      operationId: getDocument
      x-owner-service: knowledge
      responses:
        "200":
          description: Document details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [documents]
      summary: Update document tags
      operationId: updateDocument
      x-owner-service: file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentRequest"
      responses:
        "200":
          description: Document updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [documents]
      summary: Delete document
      operationId: deleteDocument
      x-owner-service: file
      responses:
        "204":
          description: Document deleted.
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/documents/{documentId}/chunks:
    get:
      tags: [documents]
      summary: List document chunks
      operationId: listDocumentChunks
      x-owner-service: knowledge
      parameters:
        - $ref: "#/components/parameters/DocumentId"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Document chunks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentChunkListResponse"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/documents/{documentId}/download:
    get:
      tags: [documents]
      summary: Download original document
      operationId: downloadDocument
      x-owner-service: file
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Original file stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/search:
    post:
      tags: [knowledge]
      summary: Search knowledge bases
      operationId: searchKnowledge
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/chat/sessions:
    get:
      tags: [chat]
      summary: List chat sessions
      operationId: listChatSessions
      x-owner-service: qa
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Chat session list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags: [chat]
      summary: Create chat session
      operationId: createChatSession
      x-owner-service: qa
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatSessionRequest"
      responses:
        "201":
          description: Chat session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/chat/sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [chat]
      summary: Get chat session
      operationId: getChatSession
      x-owner-service: qa
      responses:
        "200":
          description: Chat session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSessionResponse"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [chat]
      summary: Delete chat session
      operationId: deleteChatSession
      x-owner-service: qa
      responses:
        "204":
          description: Chat session deleted.
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/chat/sessions/{sessionId}/messages:
    post:
      tags: [chat]
      summary: Send a chat message and receive a non-streaming answer
      operationId: createChatMessage
      x-owner-service: qa
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatMessageRequest"
      responses:
        "200":
          description: Chat answer.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/chat/sessions/{sessionId}/stream:
    post:
      tags: [chat]
      summary: Send a chat message and receive a streaming answer
      operationId: streamChatMessage
      x-owner-service: qa
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatMessageRequest"
      responses:
        "200":
          description: Server-sent event stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE events using progress, message, citation, done, and error event types.
        "400":
          $ref: "#/components/responses/Error"

  /api/v1/reports:
    get:
      tags: [reports]
      summary: List report records
      operationId: listReports
      x-owner-service: document
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Report list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags: [reports]
      summary: Create report record
      operationId: createReport
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportRequest"
      responses:
        "201":
          description: Report created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/reports/{reportId}:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags: [reports]
      summary: Get report record
      operationId: getReport
      x-owner-service: document
      responses:
        "200":
          description: Report details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [reports]
      summary: Update report record
      operationId: updateReport
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReportRequest"
      responses:
        "200":
          description: Report updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      tags: [reports]
      summary: Delete report record
      operationId: deleteReport
      x-owner-service: document
      responses:
        "204":
          description: Report deleted.
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/reports/{reportId}/outline:
    post:
      tags: [reports]
      summary: Generate or regenerate report outline
      operationId: generateReportOutline
      x-owner-service: document
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: Report outline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportOutlineResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/reports/{reportId}/sections/{sectionId}/stream:
    post:
      tags: [reports]
      summary: Generate report section content as an event stream
      operationId: streamReportSection
      x-owner-service: document
      parameters:
        - $ref: "#/components/parameters/ReportId"
        - $ref: "#/components/parameters/SectionId"
      responses:
        "200":
          description: Server-sent event stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE events using progress, message, done, and error event types.
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/reports/{reportId}/export:
    post:
      tags: [reports]
      summary: Export report as DOCX
      operationId: exportReport
      x-owner-service: document
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "202":
          description: Export job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportReportResponse"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/reports/{reportId}/download:
    get:
      tags: [reports]
      summary: Download exported report file
      operationId: downloadReport
      x-owner-service: document
      parameters:
        - $ref: "#/components/parameters/ReportId"
      responses:
        "200":
          description: Exported report file stream.
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"

  /api/v1/admin/overview:
    get:
      tags: [admin]
      summary: Get administration overview metrics
      operationId: getAdminOverview
      x-owner-service: gateway
      description: Gateway may aggregate read-only metrics from domain services.
      responses:
        "200":
          description: Overview metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverviewResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Keyword:
      name: keyword
      in: query
      schema:
        type: string
    KnowledgeBaseId:
      name: knowledgeBaseId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
    SectionId:
      name: sectionId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required: [data, requestId]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status:
              type: string
              example: ok
        requestId:
          type: string
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
          enum:
            - validation_error
            - unauthorized
            - forbidden
            - not_found
            - conflict
            - rate_limited
            - dependency_error
            - internal_error
        message:
          type: string
        requestId:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
    PageMeta:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    UserSummary:
      type: object
      required: [id, username, roles]
      properties:
        id:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            type: string
    AuthResponse:
      type: object
      required: [data, requestId]
      properties:
        data:
          type: object
          required: [user]
          properties:
            user:
              $ref: "#/components/schemas/UserSummary"
            accessToken:
              type: string
              description: Present only when token-based auth is selected.
        requestId:
          type: string
    UserResponse:
      type: object
      required: [data, requestId]
      properties:
        data:
          $ref: "#/components/schemas/UserSummary"
        requestId:
          type: string

    KnowledgeBaseType:
      type: string
      enum: [standard, report, terminology, general]
    RetrievalStrategy:
      type: string
      enum: [vector, vector_rerank]
    KnowledgeBaseSummary:
      type: object
      required: [id, name, type, documentCount, createdAt, createdBy]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/KnowledgeBaseType"
        retrievalStrategy:
          $ref: "#/components/schemas/RetrievalStrategy"
        documentCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
    CreateKnowledgeBaseRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          $ref: "#/components/schemas/KnowledgeBaseType"
        retrievalStrategy:
          $ref: "#/components/schemas/RetrievalStrategy"
    UpdateKnowledgeBaseRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        retrievalStrategy:
          $ref: "#/components/schemas/RetrievalStrategy"
    KnowledgeBaseResponse:
      type: object
      required: [data, requestId]
      properties:
        data:
          $ref: "#/components/schemas/KnowledgeBaseSummary"
        requestId:
          type: string
    KnowledgeBaseListResponse:
      type: object
      required: [data, page, requestId]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeBaseSummary"
        page:
          $ref: "#/components/schemas/PageMeta"
        requestId:
          type: string

    DocumentStatus:
      type: string
      enum: [uploaded, parsing, chunking, embedding, ready, failed]
    DocumentSummary:
      type: object
      required: [id, knowledgeBaseId, name, status, createdAt]
      properties:
        id:
          type: string
        knowledgeBaseId:
          type: string
        name:
          type: string
        status:
          $ref: "#/components/schemas/DocumentStatus"
        tags:
          type: array
          items:
            type: string
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
    UpdateDocumentRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
    DocumentResponse:
      type: object
      required: [data, requestId]
      properties:
        data:
          $ref: "#/components/schemas/DocumentSummary"
        requestId:
          type: string
    DocumentListResponse:
      type: object
      required: [data, page, requestId]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSummary"
        page:
          $ref: "#/components/schemas/PageMeta"
        requestId:
          type: string
    DocumentChunk:
      type: object
      required: [id, documentId, content]
      properties:
        id:
          type: string
        documentId:
          type: string
        sectionPath:
          type: string
        content:
          type: string
        score:
          type: number
          format: float
    DocumentChunkListResponse:
      type: object
      required: [data, page, requestId]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DocumentChunk"
