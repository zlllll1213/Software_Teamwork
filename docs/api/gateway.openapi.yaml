        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportFileRequest'
      responses:
        '202':
          description: Report file accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportFileResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/report-files/{reportFileId}:
