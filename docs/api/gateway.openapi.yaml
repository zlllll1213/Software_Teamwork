openapi: 3.0.3
info:
  title: Power Knowledge Platform Gateway API
  version: 0.1.0
  license:
    name: Unspecified
    url: https://github.com/Sakayori-Iroha-168/Software_Teamwork
  description: |
    Public caller-facing API contract for the gateway service.
    All stable public and service-to-service HTTP APIs must use RESTful resource-oriented paths.
    This revision treats gateway health checks, user/session, file-owned routes,
    knowledge-owned knowledge base, document processing, chunk, and retrieval routes,
    and document-owned report generation routes as active contracts. Downstream
    QA and admin aggregation interfaces remain under x-missing-contracts until finalized.
x-api-style:
  required: RESTful resource-oriented HTTP APIs
  appliesTo:
  - public gateway APIs
  - service-to-service HTTP APIs
  rules:
  - Model stable routes as resources or resource collections.
  - Use HTTP methods for actions: GET reads, POST creates, PATCH updates, DELETE removes.
  - Do not put action verbs such as login, logout, register, download, search, generate, export, retry, or revoke in stable paths.
  - Model long-running work as resources such as jobs, files, sessions, messages, events, or queries.
  exceptions:
  - GET /healthz
  - GET /readyz
servers:
- url: /
  description: Gateway root
security:
- bearerAuth: []
tags:
- name: health
  description: Gateway process and readiness checks.
- name: auth
  description: User and session APIs owned by auth service.
- name: knowledge
  description: Knowledge base, document processing, chunk, and retrieval APIs owned by knowledge service.
- name: documents
  description: File-owned document upload, metadata, deletion, and content APIs.
- name: report-generation
  description: Document-owned report records, templates, jobs, generated files, statistics, and logs.
paths:
  /healthz:
    get:
      tags:
      - health
      summary: Liveness check
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: Gateway process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/Error'
  /readyz:
    get:
      tags:
      - health
      summary: Readiness check
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: Gateway is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'
  /api/v1/users:
    post:
      tags:
      - auth
      summary: Create user
      operationId: createUser
      security: []
      x-owner-service: auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User and session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/sessions:
    post:
      tags:
      - auth
      summary: Create session
      operationId: createSession
      security: []
      x-owner-service: auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/current:
    delete:
      tags:
      - auth
      summary: Delete current session
      operationId: deleteCurrentSession
      x-owner-service: auth
      responses:
        '204':
          description: Current session deleted.
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/users/me:
    get:
      tags:
      - auth
      summary: Get current user
      operationId: getCurrentUser
      x-owner-service: auth
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases:
    get:
      tags:
      - knowledge
      summary: List knowledge bases
      operationId: listKnowledgeBases
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
      responses:
        '200':
          description: Knowledge bases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseListResponse'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - knowledge
      summary: Create knowledge base
      operationId: createKnowledgeBase
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKnowledgeBaseRequest'
      responses:
        '201':
          description: Knowledge base created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases/{knowledgeBaseId}:
    parameters:
    - $ref: '#/components/parameters/KnowledgeBaseId'
    get:
      tags:
      - knowledge
      summary: Get knowledge base
      operationId: getKnowledgeBase
      x-owner-service: knowledge
      responses:
        '200':
          description: Knowledge base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - knowledge
      summary: Update knowledge base
      operationId: updateKnowledgeBase
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateKnowledgeBaseRequest'
      responses:
        '200':
          description: Knowledge base updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      description: Updating chunk or retrieval strategies may require reprocessing documents; reprocessing job behavior is owned by knowledge service.
    delete:
      tags:
      - knowledge
      summary: Delete knowledge base
      operationId: deleteKnowledgeBase
      x-owner-service: knowledge
      responses:
        '204':
          description: Knowledge base deleted.
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases/{knowledgeBaseId}/documents:
    parameters:
    - $ref: '#/components/parameters/KnowledgeBaseId'
    get:
      tags:
      - knowledge
      summary: List knowledge-base documents
      operationId: listKnowledgeBaseDocuments
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
      - name: status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/DocumentStatus'
      responses:
        '200':
          description: Documents in the knowledge base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - documents
      summary: Upload a document to a knowledge base
      operationId: uploadKnowledgeBaseDocument
      x-owner-service: file
      description: Gateway exposes the knowledge-base document upload workflow. File service owns raw upload and file-owned metadata for this knowledge document context; knowledge service owns ingestion state, chunks, embeddings, and retrieval after handoff. Report templates, report materials, and generated report files are separate document-owned resources and must not be modeled through this path.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Document accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/documents/{documentId}:
    parameters:
    - $ref: '#/components/parameters/DocumentId'
    get:
      tags:
      - knowledge
      summary: Get document processing details
      operationId: getDocument
      x-owner-service: knowledge
      responses:
        '200':
          description: Document processing details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - documents
      summary: Update document tags
      operationId: updateDocument
      x-owner-service: file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        '200':
          description: Document updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          $ref: '#/components/responses/Error'
      description: Update file-owned document metadata only. Knowledge-owned processing fields are not mutated by this operation.
    delete:
      tags:
      - documents
      summary: Delete document
      operationId: deleteDocument
      x-owner-service: file
      responses:
        '204':
          description: Document deleted.
        '404':
          $ref: '#/components/responses/Error'
      description: Delete the file-owned document record and original object. Gateway or file service must coordinate knowledge index cleanup through the knowledge-owned document lifecycle.
  /api/v1/documents/{documentId}/chunks:
    parameters:
    - $ref: '#/components/parameters/DocumentId'
    get:
      tags:
      - knowledge
      summary: List document chunks
      operationId: listDocumentChunks
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      responses:
        '200':
          description: Document chunks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentChunkListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/documents/{documentId}/content:
    get:
      tags:
      - documents
      summary: Get original document content
      operationId: getDocumentContent
      x-owner-service: file
      parameters:
      - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Original file stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/Error'
      description: Return the original file content from the file service through gateway.
  /api/v1/knowledge-queries:
    post:
      tags:
      - knowledge
      summary: Create knowledge query
      operationId: createKnowledgeQuery
      x-owner-service: knowledge
      description: Run a resource-mode knowledge retrieval query. Query execution is modeled as creating a knowledge-query resource, not as an action-style search path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeQueryRequest'
      responses:
        '201':
          description: Knowledge query result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeQueryResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/report-types:
    get:
      tags:
      - report-generation
      summary: List report types
      operationId: listReportTypes
      x-owner-service: document
      responses:
        '200':
          description: Report types.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTypeListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/report-templates:
    get:
      tags:
      - report-generation
      summary: List report templates
      operationId: listReportTemplates
      x-owner-service: document
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: reportType
        in: query
        schema:
          type: string
      - name: enabled
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Report templates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateListResponse'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - report-generation
      summary: Create report template
      operationId: createReportTemplate
      x-owner-service: document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateReportTemplateRequest'
      responses:
        '201':
          description: Report template created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/report-templates/{reportTemplateId}:
    parameters:
    - $ref: '#/components/parameters/ReportTemplateId'
    get:
      tags:
      - report-generation
      summary: Get report template
      operationId: getReportTemplate
      x-owner-service: document
      responses:
        '200':
          description: Report template.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - report-generation
      summary: Update report template
      operationId: updateReportTemplate
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportTemplateRequest'
      responses:
        '200':
          description: Report template updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateResponse'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - report-generation
      summary: Delete report template
      operationId: deleteReportTemplate
      x-owner-service: document
      description: Prefer disabling or soft deleting templates that have been used by reports.
      responses:
        '204':
          description: Report template deleted.
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/report-templates/{reportTemplateId}/structure:
    parameters:
    - $ref: '#/components/parameters/ReportTemplateId'
    get:
      tags:
      - report-generation
      summary: Get report template structure
      operationId: getReportTemplateStructure
      x-owner-service: document
      responses:
        '200':
          description: Report template structure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateStructureResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - report-generation
      summary: Update report template structure
      operationId: updateReportTemplateStructure
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportTemplateStructureRequest'
      responses:
        '200':
          description: Report template structure updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateStructureResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/report-materials:
    get:
      tags:
      - report-generation
      summary: List report materials
      operationId: listReportMaterials
      x-owner-service: document
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: category
        in: query
        schema:
          type: string
      - name: enabled
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Report materials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportMaterialListResponse'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - report-generation
      summary: Create report material
      operationId: createReportMaterial
      x-owner-service: document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateReportMaterialRequest'
      responses:
        '201':
          description: Report material created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportMaterialResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/report-materials/{materialId}:
    parameters:
    - $ref: '#/components/parameters/MaterialId'
    get:
      tags:
      - report-generation
      summary: Get report material
      operationId: getReportMaterial
      x-owner-service: document
      responses:
        '200':
          description: Report material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportMaterialResponse'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - report-generation
      summary: Delete report material
      operationId: deleteReportMaterial
      x-owner-service: document
      description: Prefer soft deletion when material has been referenced by generation jobs.
      responses:
        '204':
          description: Report material deleted.
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/reports:
    get:
      tags:
      - report-generation
      summary: List reports
      operationId: listReports
      x-owner-service: document
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: reportType
        in: query
        schema:
          type: string
      - name: status
        in: query
        schema:
          type: string
      - name: keyword
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Reports.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - report-generation
      summary: Create report
      operationId: createReport
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/reports/{reportId}:
    parameters:
    - $ref: '#/components/parameters/ReportId'
    get:
      tags:
      - report-generation
      summary: Get report
      operationId: getReport
      x-owner-service: document
      responses:
        '200':
          description: Report.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - report-generation
      summary: Update report
      operationId: updateReport
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportRequest'
      responses:
        '200':
          description: Report updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - report-generation
      summary: Delete report
      operationId: deleteReport
      x-owner-service: document
      description: Prefer soft deletion so historical jobs and generated files remain auditable.
      responses:
        '204':
          description: Report deleted.
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/reports/{reportId}/outlines:
    parameters:
    - $ref: '#/components/parameters/ReportId'
    get:
      tags:
      - report-generation
      summary: List report outlines
      operationId: listReportOutlines
      x-owner-service: document
      responses:
        '200':
          description: Report outlines.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportOutlineListResponse'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - report-generation
      summary: Create report outline
      operationId: createReportOutline
      x-owner-service: document
      description: Manual outline saves create a new outline version. AI-created outlines are produced by report jobs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportOutlineRequest'
      responses:
        '201':
          description: Report outline created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportOutlineResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/reports/{reportId}/outlines/{outlineId}:
    parameters:
    - $ref: '#/components/parameters/ReportId'
    - $ref: '#/components/parameters/OutlineId'
    get:
      tags:
      - report-generation
      summary: Get report outline
      operationId: getReportOutline
      x-owner-service: document
      responses:
        '200':
          description: Report outline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportOutlineResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - report-generation
      summary: Update report outline
      operationId: updateReportOutline
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportOutlineRequest'
      responses:
        '200':
          description: Report outline updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportOutlineResponse'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/reports/{reportId}/outlines/{outlineId}/sections/{sectionId}:
    parameters:
    - $ref: '#/components/parameters/ReportId'
    - $ref: '#/components/parameters/OutlineId'
    - $ref: '#/components/parameters/SectionId'
    delete:
      tags:
      - report-generation
      summary: Delete report outline section
      operationId: deleteReportOutlineSection
      x-owner-service: document
      responses:
        '204':
          description: Report outline section deleted.
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/reports/{reportId}/sections:
    parameters:
    - $ref: '#/components/parameters/ReportId'
    get:
      tags:
      - report-generation
      summary: List report sections
      operationId: listReportSections
      x-owner-service: document
      responses:
        '200':
          description: Report sections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSectionListResponse'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - report-generation
      summary: Create report section
      operationId: createReportSection
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportSectionRequest'
      responses:
        '201':
          description: Report section created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSectionResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/reports/{reportId}/sections/{sectionId}:
    parameters:
    - $ref: '#/components/parameters/ReportId'
    - $ref: '#/components/parameters/SectionId'
    get:
      tags:
      - report-generation
      summary: Get report section
      operationId: getReportSection
      x-owner-service: document
      responses:
        '200':
          description: Report section.
          content:
            application/json:
