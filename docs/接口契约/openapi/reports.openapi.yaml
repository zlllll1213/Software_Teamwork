openapi: 3.0.3
info:
  title: Report Generation API
  version: 0.1.0
  description: RESTful API contract for report templates, reports, outlines, sections, exports, generation jobs, settings, and stats. JSON, SSE, and download authorization endpoints use Bearer JWT auth; model calls use an AI gateway with an OpenAI-compatible API.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Templates
  - name: Reports
  - name: Outlines
  - name: Sections
  - name: Exports
  - name: Jobs
  - name: Settings
  - name: Stats
paths:
  /report-templates:
    get:
      tags: [Templates]
      summary: List report templates
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: reportType
          in: query
          schema: { $ref: '#/components/schemas/ReportType' }
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TemplatePage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Templates]
      summary: Create report template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTemplateRequest' }
      responses:
        '201':
          description: Created template
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        default: { $ref: '#/components/responses/Error' }
  /report-templates/{templateId}:
    parameters:
      - $ref: '#/components/parameters/TemplateId'
    get:
      tags: [Templates]
      summary: Get report template
      responses:
        '200':
          description: Template
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Templates]
      summary: Update report template
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTemplateRequest' }
      responses:
        '200':
          description: Updated template
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportTemplate' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Templates]
      summary: Delete report template
      responses:
        '204': { description: Deleted }
        default: { $ref: '#/components/responses/Error' }
  /reports:
    get:
      tags: [Reports]
      summary: List reports
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: reportType
          in: query
          schema: { $ref: '#/components/schemas/ReportType' }
        - name: year
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportPage' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Reports]
      summary: Create report
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReportRequest' }
      responses:
        '201':
          description: Created report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}:
    parameters:
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [Reports]
      summary: Get report
      responses:
        '200':
          description: Report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Reports]
      summary: Update report metadata
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateReportRequest' }
      responses:
        '200':
          description: Updated report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Report' }
        default: { $ref: '#/components/responses/Error' }
    delete:
      tags: [Reports]
      summary: Delete report
      responses:
        '204': { description: Deleted }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/outline:generate:
    post:
      tags: [Outlines]
      summary: Generate report outline
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateOutlineRequest' }
      responses:
        '200':
          description: Generated outline
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutlineResponse' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/outline:
    get:
      tags: [Outlines]
      summary: Get report outline
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Outline
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutlineResponse' }
        default: { $ref: '#/components/responses/Error' }
    put:
      tags: [Outlines]
      summary: Replace report outline
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateOutlineRequest' }
      responses:
        '200':
          description: Updated outline
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OutlineResponse' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/sections:generate:
    post:
      tags: [Sections]
      summary: Start section generation job
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateSectionsRequest' }
      responses:
        '200':
          description: Generation job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobRef' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/sections:stream:
    post:
      tags: [Sections]
      summary: Stream section generation via SSE
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateSectionsRequest' }
      responses:
        '200':
          description: SSE stream. Events include job.created, section.started, section.delta, section.completed, progress.updated, error.
          content:
            text/event-stream:
              schema: { type: string }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/sections:
    get:
      tags: [Sections]
      summary: List report sections
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Section list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReportSection' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/sections/{sectionId}:
    parameters:
      - $ref: '#/components/parameters/ReportId'
      - $ref: '#/components/parameters/SectionId'
    get:
      tags: [Sections]
      summary: Get report section
      responses:
        '200':
          description: Section
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSection' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Sections]
      summary: Update report section
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSectionRequest' }
      responses:
        '200':
          description: Updated section
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSection' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/exports:
    get:
      tags: [Exports]
      summary: List report exports
      parameters:
        - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Export list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ReportExport' }
        default: { $ref: '#/components/responses/Error' }
    post:
      tags: [Exports]
      summary: Create report export
      parameters:
        - $ref: '#/components/parameters/ReportId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateExportRequest' }
      responses:
        '200':
          description: Export job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportRef' }
        default: { $ref: '#/components/responses/Error' }
  /reports/{reportId}/exports/{exportId}:download-url:
    post:
      tags: [Exports]
      summary: Create authorized report export download URL
      parameters:
        - $ref: '#/components/parameters/ReportId'
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: Download URL
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DownloadUrl' }
        default: { $ref: '#/components/responses/Error' }
  /reports/jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get report generation job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Report job
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportJob' }
        default: { $ref: '#/components/responses/Error' }
  /reports/settings:
    get:
      tags: [Settings]
      summary: Get report settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportSettings' }
        default: { $ref: '#/components/responses/Error' }
    patch:
      tags: [Settings]
      summary: Update report settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportSettingsUpdate' }
      responses:
        '200':
          description: Updated timestamp
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdatedAt' }
        default: { $ref: '#/components/responses/Error' }
  /reports/stats/overview:
    get:
      tags: [Stats]
      summary: Get report overview stats
      responses:
        '200':
          description: Report stats
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReportStats' }
        default: { $ref: '#/components/responses/Error' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    TemplateId:
      name: templateId
      in: path
      required: true
      schema: { type: string }
    ReportId:
      name: reportId
      in: path
      required: true
      schema: { type: string }
    SectionId:
      name: sectionId
      in: path
      required: true
      schema: { type: string }
    ExportId:
      name: exportId
      in: path
      required: true
      schema: { type: string }
    JobId:
      name: jobId
      in: path
      required: true
      schema: { type: string }
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    ReportType:
      type: string
      enum: [summer_peak_inspection, coal_inventory_audit]
    ReportStatus:
      type: string
      enum: [draft, outline_generating, outline_ready, content_generating, content_ready, exporting, export_ready, failed, deleted]
    SectionStatus:
      type: string
      enum: [pending, generating, ready, pending_review, failed, cancelled]
    SectionType:
      type: string
      enum: [text, table, image, mixed]
    ReportTemplate:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        reportType: { $ref: '#/components/schemas/ReportType' }
        fileId: { type: string }
        status: { type: string, enum: [active, inactive, deleted] }
        styleProfile:
          type: object
          additionalProperties: true
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateTemplateRequest:
      type: object
      required: [name, reportType, fileId]
      properties:
        name: { type: string }
        reportType: { $ref: '#/components/schemas/ReportType' }
        fileId: { type: string }
        styleProfile:
          type: object
          additionalProperties: true
    UpdateTemplateRequest:
      allOf:
        - $ref: '#/components/schemas/CreateTemplateRequest'
    TemplatePage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/ReportTemplate' }
    Report:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        reportType: { $ref: '#/components/schemas/ReportType' }
        specialty: { type: string }
        plantName: { type: string }
        year: { type: integer }
        status: { $ref: '#/components/schemas/ReportStatus' }
        templateId: { type: string }
        ownerUserId: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateReportRequest:
      type: object
      required: [title, reportType]
      properties:
        title: { type: string }
        reportType: { $ref: '#/components/schemas/ReportType' }
        specialty: { type: string }
        plantName: { type: string }
        year: { type: integer }
        templateId: { type: string }
        topic: { type: string }
    UpdateReportRequest:
      allOf:
        - $ref: '#/components/schemas/CreateReportRequest'
    ReportPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Report' }
    OutlineNode:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        parentId: { type: string, nullable: true }
        number: { type: string }
        title: { type: string }
        sectionType: { $ref: '#/components/schemas/SectionType' }
        sortOrder: { type: integer }
        children:
          type: array
          items: { $ref: '#/components/schemas/OutlineNode' }
    GenerateOutlineRequest:
      type: object
      properties:
        topic: { type: string }
        mode:
          type: string
          enum: [template, ai]
          description: template is supported for MVP; ai is reserved and returns unsupported_mode.
        materialFilters:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
    OutlineResponse:
      type: object
      properties:
        reportId: { type: string }
        status: { $ref: '#/components/schemas/ReportStatus' }
        outline:
          type: array
          items: { $ref: '#/components/schemas/OutlineNode' }
        items:
          type: array
          items: { $ref: '#/components/schemas/OutlineNode' }
        affectedSectionIds:
          type: array
          description: Sections marked as pending_review after outline changes.
          items: { type: string }
    UpdateOutlineRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/OutlineNode' }
        autoRenumber: { type: boolean }
    GenerateSectionsRequest:
      type: object
      properties:
        sectionIds:
          type: array
          items: { type: string }
        materialFilters:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        retrieval:
          type: object
          additionalProperties: true
    ReportSection:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        outlineNodeId: { type: string }
        number: { type: string }
        title: { type: string }
        sectionType: { $ref: '#/components/schemas/SectionType' }
        status: { $ref: '#/components/schemas/SectionStatus' }
        content: { type: string }
        tableData:
          type: object
          nullable: true
          additionalProperties: true
        imageFileIds:
          type: array
          items: { type: string }
        citations:
          type: array
          items:
            type: object
            additionalProperties: true
        updatedAt: { type: string, format: date-time }
    UpdateSectionRequest:
      type: object
      properties:
        content: { type: string }
        tableData:
          type: object
          nullable: true
          additionalProperties: true
        imageFileIds:
          type: array
          items: { type: string }
    ReportExport:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        fileId: { type: string }
        format: { type: string, enum: [docx] }
        status: { type: string, enum: [queued, running, ready, failed] }
        styleProfileVersion: { type: string }
        numberingMode:
          type: string
          enum: [global, by_chapter]
          description: global is supported for MVP; by_chapter is reserved for later.
        createdAt: { type: string, format: date-time }
    CreateExportRequest:
      type: object
      properties:
        format: { type: string, enum: [docx] }
        styleProfileId: { type: string }
        numberingMode:
          type: string
          enum: [global, by_chapter]
          description: global is supported for MVP; by_chapter may return unsupported_numbering_mode.
    ExportRef:
      type: object
      properties:
        exportId: { type: string }
        status: { type: string }
    JobRef:
      type: object
      properties:
        jobId: { type: string }
        status: { type: string }
    ReportJob:
      type: object
      properties:
        id: { type: string }
        reportId: { type: string }
        type: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        attemptCount:
          type: integer
          description: Current attempt count persisted in PostgreSQL.
        maxAttempts:
          type: integer
          description: Automatic retry limit; fixed to 3 for MVP.
        progress:
          type: object
          properties:
            completed: { type: integer }
            total: { type: integer }
        currentSectionId: { type: string }
        errorMessage: { type: string, nullable: true }
        attempts:
          type: array
          description: Recent attempt summaries, capped at the latest 10 attempts.
          items:
            type: object
            properties:
              attempt: { type: integer }
              stage: { type: string }
              status: { type: string }
              errorCode: { type: string, nullable: true }
              errorMessage: { type: string, nullable: true }
              startedAt: { type: string, format: date-time }
              finishedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ReportSettings:
      type: object
      properties:
        llm: { $ref: '#/components/schemas/ModelConfigPublic' }
        defaultTemplates:
          type: object
          additionalProperties: { type: string }
        export:
          type: object
          properties:
            defaultFormat: { type: string, enum: [docx] }
            defaultNumberingMode:
              type: string
              enum: [global, by_chapter]
              description: global is supported for MVP.
            defaultStyleProfileId: { type: string }
          additionalProperties: true
    ReportSettingsUpdate:
      allOf:
        - $ref: '#/components/schemas/ReportSettings'
        - type: object
          properties:
            llm: { $ref: '#/components/schemas/ModelConfigWritable' }
    ModelConfigPublic:
      type: object
      properties:
        provider:
          type: string
          description: Fixed to ai-gateway for MVP.
          example: ai-gateway
        model: { type: string }
        baseUrl:
          type: string
          description: AI gateway OpenAI-compatible base URL.
        timeoutSeconds: { type: integer }
    ModelConfigWritable:
      allOf:
        - $ref: '#/components/schemas/ModelConfigPublic'
        - type: object
          properties:
            apiKey:
              type: string
              writeOnly: true
              description: AI gateway API key or secret reference.
    ReportStats:
      type: object
      properties:
        templateCount: { type: integer }
        reportCount: { type: integer }
        trend30d:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              generatedCount: { type: integer }
    DownloadUrl:
      type: object
      properties:
        downloadUrl: { type: string }
        expiresAt: { type: string, format: date-time }
    UpdatedAt:
      type: object
      properties:
        updatedAt: { type: string, format: date-time }
    Page:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [validation_error, unauthorized, forbidden, not_found, conflict, rate_limited, dependency_error, internal_error]
            message: { type: string }
            requestId: { type: string }
            fields:
              type: object
              additionalProperties: { type: string }
