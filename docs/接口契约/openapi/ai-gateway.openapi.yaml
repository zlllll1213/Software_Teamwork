openapi: 3.0.3
info:
  title: Power Knowledge Platform AI Gateway Internal API
  version: 0.1.0
  license:
    name: Unspecified
    url: https://github.com/Sakayori-Iroha-168/Software_Teamwork
  description: |
    Internal service-to-service API contract for the AI Gateway service.
    This API is not frontend-facing. Frontend clients must continue to call the
    public gateway API. Domain services such as qa, knowledge, and document use
    this contract for model profile configuration and OpenAI-compatible model
    invocation APIs. Chat completions and embeddings follow OpenAI-compatible
    request/response bodies. Rerankings are an OpenAI-style extension because
    OpenAI does not define a native rerank endpoint.
x-api-scope: internal-service
x-api-style:
  required: RESTful resource-oriented HTTP APIs
  appliesTo:
  - service-to-service HTTP APIs
  rules:
  - Use /internal/v1 for internal business resources.
  - Model routes as resources or resource collections.
  - Use HTTP methods for actions.
  - Do not put action verbs such as stream, generate, embed, rerank, rotate, or activate in stable paths.
  - Model model configuration as model-profiles.
  - Model profile configuration as project-owned resources with project envelopes.
  - Model invocations use OpenAI-compatible paths and response bodies where OpenAI defines a native API.
  exceptions:
  - GET /healthz
  - GET /readyz
servers:
- url: /
  description: AI Gateway service root
security:
- serviceTokenAuth: []
tags:
- name: health
  description: AI Gateway process and readiness checks.
- name: model-profiles
  description: Runtime model provider configuration.
- name: chat
  description: Chat model invocation APIs.
- name: embeddings
  description: Embedding model invocation APIs.
- name: rerankings
  description: Rerank model invocation APIs.
paths:
  /healthz:
    get:
      tags:
      - health
      summary: Liveness check
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: AI Gateway process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/Error'
  /readyz:
    get:
      tags:
      - health
      summary: Readiness check
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: AI Gateway is ready to serve model requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: AI Gateway is not ready to serve one or more model capabilities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '429':
          $ref: '#/components/responses/Error'
  /internal/v1/model-profiles:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    get:
      tags:
      - model-profiles
      summary: List model profiles
      operationId: listModelProfiles
      x-owner-service: ai-gateway
      parameters:
      - name: purpose
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ModelPurpose'
      - name: enabled
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Model profile list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - model-profiles
      summary: Create model profile
      operationId: createModelProfile
      x-owner-service: ai-gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelProfileRequest'
      responses:
        '201':
          description: Model profile created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /internal/v1/model-profiles/{profileId}:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - model-profiles
      summary: Get model profile
      operationId: getModelProfile
      x-owner-service: ai-gateway
      responses:
        '200':
          description: Model profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - model-profiles
      summary: Update model profile
      operationId: updateModelProfile
      x-owner-service: ai-gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelProfileRequest'
      responses:
        '200':
          description: Model profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - model-profiles
      summary: Delete model profile
      operationId: deleteModelProfile
      x-owner-service: ai-gateway
      responses:
        '204':
          description: Model profile deleted.
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /internal/v1/chat/completions:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/UserIdHeader'
    post:
      tags:
      - chat
      summary: Create chat completion
      operationId: createChatCompletion
      x-owner-service: ai-gateway
      description: |
        Creates a non-streaming or streaming chat completion using an
        OpenAI-compatible request and response body. When request.stream is true
        and the client sends Accept: text/event-stream, a successful response
        uses OpenAI-compatible chat completion chunk events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat completion created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIChatCompletion'
            text/event-stream:
              schema:
                type: string
                description: Server-sent events whose data payloads are OpenAI-compatible chat completion chunks.
        '400':
          $ref: '#/components/responses/OpenAIError'
        '401':
          $ref: '#/components/responses/OpenAIError'
        '403':
          $ref: '#/components/responses/OpenAIError'
        '404':
          $ref: '#/components/responses/OpenAIError'
        '429':
          $ref: '#/components/responses/OpenAIError'
        '502':
          $ref: '#/components/responses/OpenAIError'
  /internal/v1/embeddings:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/UserIdHeader'
    post:
      tags:
      - embeddings
      summary: Create embeddings
      operationId: createEmbeddings
      x-owner-service: ai-gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbeddingRequest'
      responses:
        '200':
          description: Embeddings created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenAIEmbeddingList'
        '400':
          $ref: '#/components/responses/OpenAIError'
        '401':
          $ref: '#/components/responses/OpenAIError'
        '403':
          $ref: '#/components/responses/OpenAIError'
        '404':
          $ref: '#/components/responses/OpenAIError'
        '429':
          $ref: '#/components/responses/OpenAIError'
        '502':
          $ref: '#/components/responses/OpenAIError'
  /internal/v1/rerankings:
    parameters:
    - $ref: '#/components/parameters/RequestIdHeader'
    - $ref: '#/components/parameters/CallerServiceHeader'
    - $ref: '#/components/parameters/UserIdHeader'
    post:
      tags:
      - rerankings
      summary: Create reranking
      operationId: createReranking
      x-owner-service: ai-gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerankingRequest'
      responses:
        '200':
          description: Reranking created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RerankingResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    serviceTokenAuth:
      type: apiKey
      in: header
      name: X-Service-Token
      description: Internal service-to-service credential. Must not be exposed to frontend clients.
  parameters:
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: Request correlation id. AI Gateway generates one when absent.
    CallerServiceHeader:
      name: X-Caller-Service
      in: header
      required: true
      schema:
        type: string
        enum:
        - gateway
        - qa
        - knowledge
        - document
        - auth
        - file
      description: Internal service making the request.
    UserIdHeader:
      name: X-User-Id
      in: header
      required: false
      schema:
        type: string
      description: Authenticated user id when the model request is user-triggered.
    ProfileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Project envelope error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    OpenAIError:
      description: OpenAI-compatible error response for model invocation APIs.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - status
          properties:
            status:
              type: string
              example: ok
        requestId:
          type: string
    ReadinessResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - status
          - checks
          properties:
            status:
              type: string
              enum:
              - ok
              - degraded
              - unavailable
            checks:
              type: array
              items:
                $ref: '#/components/schemas/ReadinessCheck'
        requestId:
          type: string
    ReadinessCheck:
      type: object
      required:
      - name
      - status
      properties:
        name:
          type: string
          example: chat_profile
        status:
          type: string
          enum:
          - ok
          - missing
          - failed
        message:
          type: string
          description: Secret-safe diagnostic message.
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required:
      - code
      - message
      - requestId
      properties:
        code:
          type: string
          enum:
          - validation_error
          - unauthorized
          - forbidden
          - not_found
          - conflict
          - rate_limited
          - dependency_error
          - internal_error
        message:
          type: string
        requestId:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
    OpenAIErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/OpenAIErrorDetail'
    OpenAIErrorDetail:
      type: object
      required:
      - message
      - type
      properties:
        message:
          type: string
        type:
          type: string
          enum:
          - invalid_request_error
          - authentication_error
          - permission_error
          - not_found_error
          - conflict_error
          - rate_limit_error
          - upstream_error
          - internal_error
        param:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
    ModelPurpose:
      type: string
      enum:
      - chat
      - embedding
      - rerank
    ModelProvider:
      type: string
      enum:
      - openai_compatible
      - siliconflow
      - local_compatible
    ModelProfile:
      type: object
      required:
      - id
      - name
      - purpose
      - provider
      - baseUrl
      - model
      - enabled
      - isDefault
      - timeoutMs
      - apiKeyConfigured
      - supportsStreaming
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        purpose:
          $ref: '#/components/schemas/ModelPurpose'
        provider:
          $ref: '#/components/schemas/ModelProvider'
        baseUrl:
          type: string
          format: uri
        model:
          type: string
        enabled:
          type: boolean
        isDefault:
          type: boolean
        timeoutMs:
          type: integer
          minimum: 1000
        apiKeyConfigured:
          type: boolean
          description: True when a provider credential exists. Raw API keys are never returned.
        supportsStreaming:
          type: boolean
        defaultParameters:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateModelProfileRequest:
      type: object
      required:
      - name
      - purpose
      - provider
      - baseUrl
      - model
      - apiKey
      properties:
        name:
          type: string
        purpose:
          $ref: '#/components/schemas/ModelPurpose'
        provider:
          $ref: '#/components/schemas/ModelProvider'
        baseUrl:
          type: string
          format: uri
        model:
          type: string
        apiKey:
          type: string
          format: password
          writeOnly: true
        enabled:
          type: boolean
          default: true
        isDefault:
          type: boolean
          default: false
        timeoutMs:
          type: integer
          minimum: 1000
          default: 60000
        supportsStreaming:
          type: boolean
          default: false
        defaultParameters:
          type: object
          additionalProperties: true
    UpdateModelProfileRequest:
      type: object
      properties:
        name:
          type: string
        provider:
          $ref: '#/components/schemas/ModelProvider'
        baseUrl:
          type: string
          format: uri
        model:
          type: string
        apiKey:
          type: string
          format: password
          writeOnly: true
          description: Write-only provider credential for key rotation.
        enabled:
          type: boolean
        isDefault:
          type: boolean
        timeoutMs:
          type: integer
          minimum: 1000
        supportsStreaming:
          type: boolean
        defaultParameters:
          type: object
          additionalProperties: true
    ModelProfileResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/ModelProfile'
        requestId:
          type: string
    ModelProfileListResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ModelProfile'
        requestId:
          type: string
    ChatRole:
      type: string
      enum:
      - system
      - user
      - assistant
      - tool
    ChatMessage:
      type: object
      required:
      - role
      - content
      properties:
        role:
          $ref: '#/components/schemas/ChatRole'
        content:
          type: string
        name:
          type: string
          description: Optional participant or tool name.
    ChatCompletionRequest:
      type: object
      required:
      - model
      - messages
      properties:
        profile_id:
          type: string
          description: Optional AI Gateway profile id. Uses the default chat profile when omitted.
        model:
          type: string
          description: OpenAI-compatible model name or configured model alias.
        messages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatMessage'
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        max_tokens:
          type: integer
          minimum: 1
        stream:
          type: boolean
          default: false
        metadata:
          type: object
          additionalProperties:
            type: string
    OpenAIChatCompletionChoice:
      type: object
      required:
      - index
      - message
      - finish_reason
      properties:
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatMessage'
        finish_reason:
          type: string
          nullable: true
          enum:
          - stop
          - length
          - content_filter
          - tool_calls
          - null
    ChatCompletionDelta:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/ChatRole'
        content:
          type: string
    OpenAIChatCompletionChunkChoice:
      type: object
      required:
      - index
      - delta
      - finish_reason
      properties:
        index:
          type: integer
        delta:
          $ref: '#/components/schemas/ChatCompletionDelta'
        finish_reason:
          type: string
          nullable: true
          enum:
          - stop
          - length
          - content_filter
          - tool_calls
          - null
    TokenUsage:
      type: object
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
        completion_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
    OpenAIChatCompletion:
      type: object
      required:
      - id
      - object
      - created
      - model
      - choices
      properties:
        id:
          type: string
        object:
          type: string
          enum:
          - chat.completion
        created:
          type: integer
          description: Unix timestamp in seconds.
        model:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/OpenAIChatCompletionChoice'
        usage:
          $ref: '#/components/schemas/TokenUsage'
    OpenAIChatCompletionChunk:
      type: object
      required:
      - id
      - object
      - created
      - model
      - choices
      properties:
        id:
          type: string
        object:
          type: string
          enum:
          - chat.completion.chunk
        created:
          type: integer
          description: Unix timestamp in seconds.
        model:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/OpenAIChatCompletionChunkChoice'
        usage:
          $ref: '#/components/schemas/TokenUsage'
    EmbeddingRequest:
      type: object
      required:
      - model
      - input
      properties:
        profile_id:
          type: string
          description: Optional AI Gateway profile id. Uses the default embedding profile when omitted.
        model:
          type: string
          description: OpenAI-compatible model name or configured model alias.
        input:
          type: array
          minItems: 1
          items:
            type: string
        dimensions:
          type: integer
          minimum: 1
        encoding_format:
          type: string
          enum:
          - float
          - base64
          default: float
        user:
          type: string
          description: Optional end-user identifier following OpenAI-compatible request shape.
    EmbeddingVector:
      type: object
      required:
      - object
      - index
      - embedding
      properties:
        object:
          type: string
          enum:
          - embedding
        index:
          type: integer
        embedding:
          type: array
          items:
            type: number
            format: float
    OpenAIEmbeddingList:
      type: object
      required:
      - object
      - data
      - model
      properties:
        object:
          type: string
          enum:
          - list
        data:
          type: array
          items:
            $ref: '#/components/schemas/EmbeddingVector'
        model:
          type: string
        usage:
          $ref: '#/components/schemas/TokenUsage'
    RerankingDocument:
      type: object
      required:
      - id
      - text
      properties:
        id:
          type: string
        text:
          type: string
    RerankingRequest:
      type: object
      required:
      - model
      - query
      - documents
      properties:
        profile_id:
          type: string
          description: Optional AI Gateway profile id. Uses the default rerank profile when omitted.
        model:
          type: string
          description: OpenAI-style model name or configured model alias.
        query:
          type: string
        documents:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RerankingDocument'
        top_n:
          type: integer
          minimum: 1
        metadata:
          type: object
          additionalProperties:
            type: string
    RerankingResult:
      type: object
      required:
      - index
      - document_id
      - score
      properties:
        index:
          type: integer
        document_id:
          type: string
        score:
          type: number
          format: float
    RerankingResponse:
      type: object
      required:
      - object
      - data
      - model
      properties:
        object:
          type: string
          enum:
          - list
        data:
          type: array
          items:
            $ref: '#/components/schemas/RerankingResult'
        model:
          type: string
        usage:
          $ref: '#/components/schemas/TokenUsage'
