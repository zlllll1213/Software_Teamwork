openapi: 3.0.3
info:
  title: Knowledge Management API
  version: 0.1.0
  description: RESTful API contract for knowledge bases, documents, processing, retrieval, support materials, settings, and stats. All endpoints use Bearer JWT auth; model calls use an AI gateway with an OpenAI-compatible API.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: KnowledgeBases
  - name: Documents
  - name: ProcessingJobs
  - name: Retrieval
  - name: SupportMaterials
  - name: Settings
  - name: Stats
paths:
  /knowledge/bases:
    get:
      tags: [KnowledgeBases]
      summary: List knowledge bases
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/DocumentType'
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Knowledge base list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBasePage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [KnowledgeBases]
      summary: Create knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKnowledgeBaseRequest'
      responses:
        '201':
          description: Created knowledge base
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/bases/{knowledgeBaseId}:
    parameters:
      - $ref: '#/components/parameters/KnowledgeBaseId'
    get:
      tags: [KnowledgeBases]
      summary: Get knowledge base
      responses:
        '200':
          description: Knowledge base
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [KnowledgeBases]
      summary: Update knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateKnowledgeBaseRequest'
      responses:
        '200':
          description: Updated knowledge base
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [KnowledgeBases]
      summary: Delete knowledge base
      responses:
        '204':
          description: Deleted
        default:
          $ref: '#/components/responses/Error'
  /knowledge/bases:batch-delete:
    post:
      tags: [KnowledgeBases]
      summary: Batch delete knowledge bases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteRequest'
      responses:
        '200':
          description: Batch delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResult'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/bases/{knowledgeBaseId}/documents:
    parameters:
      - $ref: '#/components/parameters/KnowledgeBaseId'
    get:
      tags: [Documents]
      summary: List documents in a knowledge base
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DocumentStatus'
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Documents]
      summary: Create document record after file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Created document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentCreated'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/documents/{documentId}:
    parameters:
      - $ref: '#/components/parameters/DocumentId'
    get:
      tags: [Documents]
      summary: Get document
      responses:
        '200':
          description: Document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeDocument'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Documents]
      summary: Update document metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        '200':
          description: Updated document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeDocument'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Documents]
      summary: Delete document
      responses:
        '204':
          description: Deleted
        default:
          $ref: '#/components/responses/Error'
  /knowledge/documents:batch-delete:
    post:
      tags: [Documents]
      summary: Batch delete documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteRequest'
      responses:
        '200':
          description: Batch delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDeleteResult'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/documents/{documentId}:retry:
    post:
      tags: [Documents]
      summary: Retry document processing
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Retry job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRef'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/documents/{documentId}/chunks:
    get:
      tags: [Documents]
      summary: List document chunks
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Chunk list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkPage'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/documents/{documentId}:download-url:
    post:
      tags: [Documents]
      summary: Create authorized source document download URL
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadUrl'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/processing-jobs/{jobId}:
    get:
      tags: [ProcessingJobs]
      summary: Get processing job
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Processing job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingJob'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/bases/{knowledgeBaseId}:reprocess:
    post:
      tags: [ProcessingJobs]
      summary: Reprocess documents in a knowledge base
      parameters:
        - $ref: '#/components/parameters/KnowledgeBaseId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReprocessRequest'
      responses:
        '200':
          description: Reprocess jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReprocessResponse'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/retrieval/search:
    post:
      tags: [Retrieval]
      summary: Search knowledge chunks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrievalSearchRequest'
      responses:
        '200':
          description: Retrieval results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrievalSearchResponse'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/retrieval/tests:
    post:
      tags: [Retrieval]
      summary: Run retrieval test
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrievalTestRequest'
      responses:
        '200':
          description: Retrieval test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrievalTestResponse'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/support-materials:
    get:
      tags: [SupportMaterials]
      summary: List report support materials
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Material list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportMaterialPage'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [SupportMaterials]
      summary: Create support material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSupportMaterialRequest'
      responses:
        '201':
          description: Created support material
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportMaterial'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/support-materials/{materialId}:
    parameters:
      - $ref: '#/components/parameters/MaterialId'
    patch:
      tags: [SupportMaterials]
      summary: Update support material metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSupportMaterialRequest'
      responses:
        '200':
          description: Updated support material
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportMaterial'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [SupportMaterials]
      summary: Delete support material
      responses:
        '204':
          description: Deleted
        default:
          $ref: '#/components/responses/Error'
  /knowledge/settings:
    get:
      tags: [Settings]
      summary: Get knowledge settings
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeSettings'
        default:
          $ref: '#/components/responses/Error'
    patch:
      tags: [Settings]
      summary: Update knowledge settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeSettingsUpdate'
      responses:
        '200':
          description: Updated timestamp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatedAt'
        default:
          $ref: '#/components/responses/Error'
  /knowledge/stats/overview:
    get:
      tags: [Stats]
      summary: Get knowledge overview stats
      responses:
        '200':
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeStats'
        default:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    KnowledgeBaseId:
      name: knowledgeBaseId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    MaterialId:
      name: materialId
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DocumentType:
      type: string
      enum: [regulation, technical_report, term, general, support_material]
    DocumentStatus:
      type: string
      enum: [uploaded, parsing, chunking, embedding, ready, failed, deleted]
    RetrievalStrategy:
      type: string
      enum: [vector, vector_rerank]
    SegmentationStrategy:
      type: string
      enum: [heading, fixed_size]
    KnowledgeBase:
      type: object
      required: [id, name, documentType, visibility, documentCount, createdAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        documentType: { $ref: '#/components/schemas/DocumentType' }
        visibility: { type: string, enum: [private, team, public] }
        segmentation: { $ref: '#/components/schemas/SegmentationConfig' }
        retrieval: { $ref: '#/components/schemas/RetrievalConfig' }
        documentCount: { type: integer }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SegmentationConfig:
      type: object
      properties:
        strategy: { $ref: '#/components/schemas/SegmentationStrategy' }
        fixedSize:
          type: object
          nullable: true
          properties:
            chunkSize: { type: integer }
            overlapSize: { type: integer }
            recursiveMerge: { type: boolean }
            separators:
              type: array
              items: { type: string }
    RetrievalConfig:
      type: object
      properties:
        strategy: { $ref: '#/components/schemas/RetrievalStrategy' }
        topK: { type: integer }
        scoreThreshold: { type: number }
        rerankThreshold: { type: number }
        enableRerank: { type: boolean }
    CreateKnowledgeBaseRequest:
      allOf:
        - $ref: '#/components/schemas/KnowledgeBaseWritable'
    UpdateKnowledgeBaseRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        documentType: { $ref: '#/components/schemas/DocumentType' }
        visibility: { type: string, enum: [private, team, public] }
        segmentation: { $ref: '#/components/schemas/SegmentationConfig' }
        retrieval: { $ref: '#/components/schemas/RetrievalConfig' }
    KnowledgeBaseWritable:
      type: object
      required: [name, documentType]
      properties:
        name: { type: string }
        description: { type: string }
        documentType: { $ref: '#/components/schemas/DocumentType' }
        visibility: { type: string, enum: [private, team, public] }
        segmentation: { $ref: '#/components/schemas/SegmentationConfig' }
        retrieval: { $ref: '#/components/schemas/RetrievalConfig' }
    KnowledgeBasePage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/KnowledgeBase' }
    KnowledgeDocument:
      type: object
      properties:
        id: { type: string }
        knowledgeBaseId: { type: string }
        fileId: { type: string }
        filename: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        status: { $ref: '#/components/schemas/DocumentStatus' }
        tags:
          type: object
          additionalProperties: { type: string }
        chunkCount: { type: integer }
        errorMessage: { type: string, nullable: true }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateDocumentRequest:
      type: object
      required: [fileId, filename]
      properties:
        fileId: { type: string }
        filename: { type: string }
        tags:
          type: object
          additionalProperties: { type: string }
    DocumentCreated:
      type: object
      properties:
        id: { type: string }
        knowledgeBaseId: { type: string }
        fileId: { type: string }
        status: { $ref: '#/components/schemas/DocumentStatus' }
        processingJobId: { type: string }
        createdAt: { type: string, format: date-time }
    UpdateDocumentRequest:
      type: object
      properties:
        tags:
          type: object
          additionalProperties: { type: string }
    DocumentPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/KnowledgeDocument' }
    DocumentChunk:
      type: object
      properties:
        id: { type: string }
        documentId: { type: string }
        knowledgeBaseId: { type: string }
        index: { type: integer }
        sectionPath: { type: string }
        chunkType: { type: string }
        contentPreview: { type: string }
        tokenCount: { type: integer }
        metadata:
          type: object
          additionalProperties: true
    ChunkPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/DocumentChunk' }
    ProcessingJob:
      type: object
      properties:
        id: { type: string }
        documentId: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        stage: { type: string }
        attemptCount:
          type: integer
          description: Current attempt count persisted in PostgreSQL.
        maxAttempts:
          type: integer
          description: Automatic retry limit; fixed to 3 for MVP.
        progress:
          type: object
          properties:
            current: { type: integer }
            total: { type: integer }
        errorMessage: { type: string, nullable: true }
        attempts:
          type: array
          description: Recent attempt summaries, capped at the latest 10 attempts.
          items:
            type: object
            properties:
              attempt: { type: integer }
              stage: { type: string }
              status: { type: string }
              errorCode: { type: string, nullable: true }
              errorMessage: { type: string, nullable: true }
              startedAt: { type: string, format: date-time }
              finishedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ReprocessRequest:
      type: object
      properties:
        documentIds:
          type: array
          items: { type: string }
        reason:
          type: string
          enum: [segmentation_changed, retrieval_changed, parser_changed, embedding_model_changed, manual]
    ReprocessResponse:
      type: object
      properties:
        jobIds:
          type: array
          items: { type: string }
    RetrievalSearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        knowledgeBaseIds:
          type: array
          items: { type: string }
        mode: { $ref: '#/components/schemas/RetrievalStrategy' }
        topK: { type: integer }
        scoreThreshold: { type: number }
        rerankThreshold: { type: number }
        tagFilters:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        includeContent: { type: boolean }
    RetrievalSearchResponse:
      type: object
      properties:
        query: { type: string }
        results:
          type: array
          items: { $ref: '#/components/schemas/RetrievalResult' }
    RetrievalTestRequest:
      allOf:
        - $ref: '#/components/schemas/RetrievalSearchRequest'
        - type: object
          properties:
            name: { type: string }
    RetrievalTestResponse:
      type: object
      properties:
        id: { type: string }
        results:
          type: array
          items: { $ref: '#/components/schemas/RetrievalResult' }
        createdAt: { type: string, format: date-time }
    RetrievalResult:
      type: object
      properties:
        chunkId: { type: string }
        documentId: { type: string }
        knowledgeBaseId: { type: string }
        documentName: { type: string }
        sectionPath: { type: string }
        score: { type: number }
        rerankScore: { type: number, nullable: true }
        content: { type: string }
        chunkType: { type: string }
        tags:
          type: object
          additionalProperties: { type: string }
    SupportMaterial:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        materialType: { type: string }
        fileId: { type: string }
        status: { $ref: '#/components/schemas/DocumentStatus' }
        tags:
          type: object
          additionalProperties: { type: string }
    CreateSupportMaterialRequest:
      type: object
      required: [fileId, name, materialType]
      properties:
        fileId: { type: string }
        name: { type: string }
        materialType: { type: string }
        tags:
          type: object
          additionalProperties: { type: string }
    UpdateSupportMaterialRequest:
      type: object
      properties:
        name: { type: string }
        materialType: { type: string }
        tags:
          type: object
          additionalProperties: { type: string }
    SupportMaterialPage:
      allOf:
        - $ref: '#/components/schemas/Page'
        - type: object
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/SupportMaterial' }
    KnowledgeSettings:
      type: object
      properties:
        embeddingModel: { $ref: '#/components/schemas/ModelConfigPublic' }
        rerankModel: { $ref: '#/components/schemas/ModelConfigPublic' }
        parser:
          type: object
          properties:
            backend:
              type: string
              enum: [external_api]
              description: Fixed to external_api for MVP.
            baseUrl:
              type: string
              description: External HTTP parser/OCR service base URL.
            timeoutSeconds:
              type: integer
              description: Parser request timeout.
            maxConcurrency:
              type: integer
              description: Maximum concurrent parser jobs.
    KnowledgeSettingsUpdate:
      type: object
      properties:
        embeddingModel: { $ref: '#/components/schemas/ModelConfigWritable' }
        rerankModel: { $ref: '#/components/schemas/ModelConfigWritable' }
        parser:
          type: object
          properties:
            backend:
              type: string
              enum: [external_api]
              description: Fixed to external_api for MVP.
            baseUrl:
              type: string
              description: External HTTP parser/OCR service base URL.
            apiKey:
              type: string
              writeOnly: true
              description: External parser API key or secret reference.
            timeoutSeconds:
              type: integer
              description: Parser request timeout.
            maxConcurrency:
              type: integer
              description: Maximum concurrent parser jobs.
    ModelConfigPublic:
      type: object
      properties:
        provider:
          type: string
          description: Fixed to ai-gateway for MVP.
          example: ai-gateway
        model: { type: string }
        baseUrl:
          type: string
          description: AI gateway OpenAI-compatible base URL.
        dimension: { type: integer }
        topN: { type: integer }
    ModelConfigWritable:
      allOf:
        - $ref: '#/components/schemas/ModelConfigPublic'
        - type: object
          properties:
            apiKey:
              type: string
              writeOnly: true
              description: AI gateway API key or secret reference.
    KnowledgeStats:
      type: object
      properties:
        knowledgeBaseCount: { type: integer }
        documentCount: { type: integer }
        chunkCount: { type: integer }
        uploadTrend30d:
          type: array
          items: { $ref: '#/components/schemas/TrendPoint' }
    TrendPoint:
      type: object
      properties:
        date: { type: string, format: date }
        count: { type: integer }
    DownloadUrl:
      type: object
      properties:
        downloadUrl: { type: string }
        expiresAt: { type: string, format: date-time }
    JobRef:
      type: object
      properties:
        processingJobId: { type: string }
        status: { type: string }
    BatchDeleteRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: string }
    BatchDeleteResult:
      type: object
      properties:
        deleted:
          type: array
          items: { type: string }
        failed:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              code: { type: string }
              message: { type: string }
    UpdatedAt:
      type: object
      properties:
        updatedAt: { type: string, format: date-time }
    Page:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [validation_error, unauthorized, forbidden, not_found, conflict, rate_limited, dependency_error, internal_error, unsupported_intent, unsupported_mode, unsupported_numbering_mode]
            message: { type: string }
            requestId: { type: string }
            fields:
              type: object
              additionalProperties: { type: string }
