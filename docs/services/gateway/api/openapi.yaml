        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '502':
          $ref: '#/components/responses/Error'
  /api/v1/retrieval-test-runs/{testRunId}:
    parameters:
    - $ref: '#/components/parameters/TestRunId'
    get:
      tags:
