openapi: 3.0.3
info:
  title: Power Knowledge Platform Gateway API
  version: 0.1.0
  license:
    name: Unspecified
    url: https://github.com/Sakayori-Iroha-168/Software_Teamwork
  description: |
    Public caller-facing API contract for the gateway service.
    All stable public and service-to-service HTTP APIs must use RESTful resource-oriented paths.
    This revision treats gateway health checks, user/session,
    knowledge-owned knowledge base, document upload, processing, content, chunk, and retrieval routes,
    document-owned report generation and report settings routes, qa-owned intelligent question answering
    routes, and admin-facing runtime model/parser configuration routes as active
    contracts. Downstream admin overview/metrics aggregation interfaces remain
    under x-missing-contracts until finalized.
x-api-style:
  required: RESTful resource-oriented HTTP APIs
  appliesTo:
  - public gateway APIs
  - service-to-service HTTP APIs
  rules:
  - Model stable routes as resources or resource collections.
  - Use HTTP methods for actions: GET reads, POST creates, PATCH updates, DELETE removes.
  - Do not put action verbs such as login, logout, register, download, search, generate, export, retry, or revoke in stable paths.
  - Model long-running work as resources such as jobs, files, sessions, messages, events, or queries.
  exceptions:
  - GET /healthz
  - GET /readyz
servers:
- url: /
  description: Gateway root
security:
- bearerAuth: []
tags:
- name: health
  description: Gateway process and readiness checks.
- name: auth
  description: User and session APIs owned by auth service.
- name: knowledge
  description: Knowledge base, document processing, chunk, and retrieval APIs owned by knowledge service.
- name: documents
  description: Knowledge-owned document upload, metadata, deletion, and original content APIs that may reuse file service internally.
- name: report-generation
  description: Document-owned report records, templates, jobs, generated files, settings, statistics, and logs.
- name: admin-runtime-config
  description: Admin-facing runtime configuration APIs exposed by gateway. Model profiles are backed by ai-gateway; parser configs are backed by knowledge.
- name: qa-sessions
  description: QA-owned chat sessions.
- name: qa-messages
  description: QA-owned messages, answer generation, SSE streams, and event replay.
- name: qa-agent-runs
  description: QA-owned response runs and sanitized tool-call summaries.
- name: qa-citations
  description: QA-owned answer citation snapshots and citation details.
- name: qa-settings
  description: QA runtime configuration and AI Gateway profile references.
- name: qa-retrieval-tests
  description: QA-owned retrieval experience test runs backed by knowledge retrieval.
- name: qa-metrics
  description: QA question answering statistics and trends.
paths:
  /healthz:
    get:
      tags:
      - health
      summary: Liveness check
      operationId: getHealthz
      security: []
      responses:
        '200':
          description: Gateway process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/Error'
  /readyz:
    get:
      tags:
      - health
      summary: Readiness check
      operationId: getReadyz
      security: []
      responses:
        '200':
          description: Gateway is ready to serve traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '429':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'
  /api/v1/users:
    post:
      tags:
      - auth
      summary: Create user
      operationId: createUser
      security: []
      x-owner-service: auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User and session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/sessions:
    post:
      tags:
      - auth
      summary: Create session
      operationId: createSession
      security: []
      x-owner-service: auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/sessions/current:
    delete:
      tags:
      - auth
      summary: Delete current session
      operationId: deleteCurrentSession
      x-owner-service: auth
      responses:
        '204':
          description: Current session deleted.
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/users/me:
    get:
      tags:
      - auth
      summary: Get current user
      operationId: getCurrentUser
      x-owner-service: auth
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases:
    get:
      tags:
      - knowledge
      summary: List knowledge bases
      operationId: listKnowledgeBases
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
      responses:
        '200':
          description: Knowledge bases.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseListResponse'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - knowledge
      summary: Create knowledge base
      operationId: createKnowledgeBase
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKnowledgeBaseRequest'
      responses:
        '201':
          description: Knowledge base created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases/{knowledgeBaseId}:
    parameters:
    - $ref: '#/components/parameters/KnowledgeBaseId'
    get:
      tags:
      - knowledge
      summary: Get knowledge base
      operationId: getKnowledgeBase
      x-owner-service: knowledge
      responses:
        '200':
          description: Knowledge base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - knowledge
      summary: Update knowledge base
      operationId: updateKnowledgeBase
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateKnowledgeBaseRequest'
      responses:
        '200':
          description: Knowledge base updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBaseResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
      description: Updating chunk or retrieval strategies may require reprocessing documents; reprocessing job behavior is owned by knowledge service.
    delete:
      tags:
      - knowledge
      summary: Delete knowledge base
      operationId: deleteKnowledgeBase
      x-owner-service: knowledge
      responses:
        '204':
          description: Knowledge base deleted.
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/knowledge-bases/{knowledgeBaseId}/documents:
    parameters:
    - $ref: '#/components/parameters/KnowledgeBaseId'
    get:
      tags:
      - knowledge
      summary: List knowledge-base documents
      operationId: listKnowledgeBaseDocuments
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 20
      - name: status
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/DocumentStatus'
      responses:
        '200':
          description: Documents in the knowledge base.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - documents
      summary: Upload a document to a knowledge base
      operationId: uploadKnowledgeBaseDocument
      x-owner-service: knowledge
      description: Gateway exposes the knowledge-base document upload workflow. Knowledge service owns the document resource, knowledge-base association, metadata, ingestion state, chunks, embeddings, and retrieval lifecycle, and may call file service internally for the raw file object. Report templates, report materials, and generated report files are separate document-owned resources and must not be modeled through this path.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Document accepted for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/documents/{documentId}:
    parameters:
    - $ref: '#/components/parameters/DocumentId'
    get:
      tags:
      - knowledge
      summary: Get document processing details
      operationId: getDocument
      x-owner-service: knowledge
      responses:
        '200':
          description: Document processing details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - documents
      summary: Update document tags
      operationId: updateDocument
      x-owner-service: knowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        '200':
          description: Document updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          $ref: '#/components/responses/Error'
      description: Update knowledge-owned document metadata only. File service base object metadata and knowledge-owned processing fields are not mutated by this operation.
    delete:
      tags:
      - documents
      summary: Delete document
      operationId: deleteDocument
      x-owner-service: knowledge
      responses:
        '204':
          description: Document deleted.
        '404':
          $ref: '#/components/responses/Error'
      description: Delete the knowledge-owned document resource. Knowledge service coordinates chunk/index cleanup and any underlying file reference cleanup through its document lifecycle.
  /api/v1/documents/{documentId}/chunks:
    parameters:
    - $ref: '#/components/parameters/DocumentId'
    get:
      tags:
      - knowledge
      summary: List document chunks
      operationId: listDocumentChunks
      x-owner-service: knowledge
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: pageSize
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 500
          default: 50
      responses:
        '200':
          description: Document chunks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentChunkListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/documents/{documentId}/content:
    get:
      tags:
      - documents
      summary: Get original document content
      operationId: getDocumentContent
      x-owner-service: knowledge
      parameters:
      - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Original file stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/Error'
      description: Return the original knowledge document content through gateway. Knowledge service owns the document content resource and may read the underlying bytes from file service internally.
  /api/v1/knowledge-queries:
    post:
      tags:
      - knowledge
      summary: Create knowledge query
      operationId: createKnowledgeQuery
      x-owner-service: knowledge
      description: Run a resource-mode knowledge retrieval query. Query execution is modeled as creating a knowledge-query resource, not as an action-style search path.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeQueryRequest'
      responses:
        '201':
          description: Knowledge query result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeQueryResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/admin/model-profiles:
    get:
      tags:
      - admin-runtime-config
      summary: List runtime model profiles
      operationId: listAdminModelProfiles
      x-owner-service: ai-gateway
      x-gateway-role: Public admin entrypoint, admin authorization, response envelope, and secret-safe normalization. Gateway delegates provider configuration persistence and validation to ai-gateway.
      parameters:
      - name: purpose
        in: query
        schema:
          $ref: '#/components/schemas/ModelPurpose'
      - name: enabled
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Runtime model profiles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - admin-runtime-config
      summary: Create runtime model profile
      operationId: createAdminModelProfile
      x-owner-service: ai-gateway
      x-gateway-role: Public admin entrypoint, admin authorization, response envelope, and secret-safe normalization. Raw API keys are forwarded only to ai-gateway and never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelProfileRequest'
      responses:
        '201':
          description: Runtime model profile created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/admin/model-profiles/{profileId}:
    parameters:
    - $ref: '#/components/parameters/ProfileId'
    get:
      tags:
      - admin-runtime-config
      summary: Get runtime model profile
      operationId: getAdminModelProfile
      x-owner-service: ai-gateway
      x-gateway-role: Public admin entrypoint, admin authorization, response envelope, and secret-safe normalization.
      responses:
        '200':
          description: Runtime model profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - admin-runtime-config
      summary: Update runtime model profile
      operationId: updateAdminModelProfile
      x-owner-service: ai-gateway
      x-gateway-role: Public admin entrypoint, admin authorization, response envelope, and secret-safe normalization. Raw API keys are forwarded only to ai-gateway and never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelProfileRequest'
      responses:
        '200':
          description: Runtime model profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfileResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - admin-runtime-config
      summary: Delete or disable runtime model profile
      operationId: deleteAdminModelProfile
      x-owner-service: ai-gateway
      x-gateway-role: Public admin entrypoint and admin authorization. Actual delete/disable semantics are enforced by ai-gateway.
      responses:
        '204':
          description: Runtime model profile deleted or disabled.
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/admin/parser-configs:
    get:
      tags:
      - admin-runtime-config
      summary: List document parser configs
      operationId: listAdminParserConfigs
      x-owner-service: knowledge
      x-gateway-role: Public admin entrypoint, admin authorization, response envelope, and secret-safe normalization. Knowledge owns parser backend validation and document-processing behavior.
      parameters:
      - name: enabled
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Document parser configs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParserConfigListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - admin-runtime-config
      summary: Create document parser config
      operationId: createAdminParserConfig
      x-owner-service: knowledge
      x-gateway-role: Public admin entrypoint, admin authorization, response envelope, and secret-safe normalization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateParserConfigRequest'
      responses:
        '201':
          description: Document parser config created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParserConfigResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/admin/parser-configs/{parserConfigId}:
    parameters:
    - $ref: '#/components/parameters/ParserConfigId'
    get:
      tags:
      - admin-runtime-config
      summary: Get document parser config
      operationId: getAdminParserConfig
      x-owner-service: knowledge
      x-gateway-role: Public admin entrypoint, admin authorization, response envelope, and secret-safe normalization.
      responses:
        '200':
          description: Document parser config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParserConfigResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - admin-runtime-config
      summary: Update document parser config
      operationId: updateAdminParserConfig
      x-owner-service: knowledge
      x-gateway-role: Public admin entrypoint, admin authorization, response envelope, and secret-safe normalization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParserConfigRequest'
      responses:
        '200':
          description: Document parser config updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParserConfigResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - admin-runtime-config
      summary: Delete or disable document parser config
      operationId: deleteAdminParserConfig
      x-owner-service: knowledge
      x-gateway-role: Public admin entrypoint and admin authorization. Actual delete/disable semantics are enforced by knowledge.
      responses:
        '204':
          description: Document parser config deleted or disabled.
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/report-types:
    get:
      tags:
      - report-generation
      summary: List report types
      operationId: listReportTypes
      x-owner-service: document
      responses:
        '200':
          description: Report types.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTypeListResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/report-templates:
    get:
      tags:
      - report-generation
      summary: List report templates
      operationId: listReportTemplates
      x-owner-service: document
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: reportType
        in: query
        schema:
          type: string
      - name: enabled
        in: query
        schema:
          type: boolean
      responses:
        '200':
          description: Report templates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateListResponse'
        '400':
          $ref: '#/components/responses/Error'
    post:
      tags:
      - report-generation
      summary: Create report template
      operationId: createReportTemplate
      x-owner-service: document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateReportTemplateRequest'
      responses:
        '201':
          description: Report template created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateResponse'
        '400':
          $ref: '#/components/responses/Error'
  /api/v1/report-templates/{reportTemplateId}:
    parameters:
    - $ref: '#/components/parameters/ReportTemplateId'
    get:
      tags:
      - report-generation
      summary: Get report template
      operationId: getReportTemplate
      x-owner-service: document
      responses:
        '200':
          description: Report template.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - report-generation
      summary: Update report template
      operationId: updateReportTemplate
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReportTemplateRequest'
      responses:
        '200':
          description: Report template updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateResponse'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags:
      - report-generation
      summary: Delete report template
      operationId: deleteReportTemplate
      x-owner-service: document
      description: Prefer disabling or soft deleting templates that have been used by reports.
      responses:
        '204':
          description: Report template deleted.
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/v1/report-templates/{reportTemplateId}/structure:
    parameters:
    - $ref: '#/components/parameters/ReportTemplateId'
    get:
      tags:
      - report-generation
      summary: Get report template structure
      operationId: getReportTemplateStructure
      x-owner-service: document
      responses:
        '200':
          description: Report template structure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateStructureResponse'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags:
      - report-generation
      summary: Update report template structure
      operationId: updateReportTemplateStructure
      x-owner-service: document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportTemplateStructureRequest'
      responses:
        '200':
          description: Report template structure updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportTemplateStructureResponse'
        '404':
          $ref: '#/components/responses/Error'
  /api/v1/report-materials:
    get:
      tags:
      - report-generation
      summary: List report materials
      operationId: listReportMaterials
      x-owner-service: document
      parameters:
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
      - name: category
        in: query
