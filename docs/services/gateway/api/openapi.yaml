components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: Opaque bearer access token issued by auth and cached by gateway through a token hash; callers must not treat it as a JWT.
  parameters:
    KnowledgeBaseId:
      name: knowledgeBaseId
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
    ReportTemplateId:
      name: reportTemplateId
      in: path
      required: true
      schema:
        type: string
    MaterialId:
      name: materialId
      in: path
      required: true
      schema:
        type: string
    OutlineId:
      name: outlineId
      in: path
      required: true
      schema:
        type: string
    SectionId:
      name: sectionId
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
    ReportFileId:
      name: reportFileId
      in: path
      required: true
      schema:
        type: string
    ProfileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
    ParserConfigId:
      name: parserConfigId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    MessageId:
      name: messageId
      in: path
      required: true
      schema:
        type: string
    ResponseRunId:
      name: responseRunId
      in: path
      required: true
      schema:
        type: string
    CitationId:
      name: citationId
      in: path
      required: true
      schema:
        type: string
    TestRunId:
      name: testRunId
      in: path
      required: true
      schema:
        type: string
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - status
          properties:
            status:
              type: string
              example: ok
        requestId:
          type: string
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      required:
      - code
      - message
      - requestId
      properties:
        code:
          type: string
          enum:
          - validation_error
          - unauthorized
          - forbidden
          - not_found
          - conflict
          - rate_limited
          - dependency_error
          - internal_error
          - not_implemented
          - unsupported_intent
          - unsupported_mode
        message:
          type: string
        requestId:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
    CreateUserRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    CreateSessionRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    UserSummary:
      type: object
      required:
      - id
      - username
      - roles
      - permissions
      properties:
        id:
          type: string
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
    SessionSummary:
      type: object
      required:
      - sessionId
      - accessToken
      - tokenType
      - expiresAt
      properties:
        sessionId:
          type: string
        accessToken:
          type: string
          description: Opaque bearer credential sent by the frontend on later requests. This token is not a JWT and must not be parsed for claims.
          example: tok_8Ywq7T2n4pQ9mR3xV6sL
        tokenType:
          type: string
          enum:
          - Bearer
          default: Bearer
        expiresAt:
          type: string
          format: date-time
    SessionResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          type: object
          required:
          - user
          - session
          properties:
            user:
              $ref: '#/components/schemas/UserSummary'
            session:
              $ref: '#/components/schemas/SessionSummary'
        requestId:
          type: string
    UserResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/UserSummary'
        requestId:
          type: string
    PageInfo:
      type: object
      required:
      - page
      - pageSize
      - total
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
    JsonObject:
      type: object
      additionalProperties: true
    ChunkStrategy:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          example: SEMANTIC_TEXT
        chunkSize:
          type: integer
          minimum: 1
          example: 1600
        overlap:
          type: integer
          minimum: 0
          example: 200
        separators:
          type: array
          items:
            type: string
    RetrievalStrategy:
      type: object
      additionalProperties: true
      properties:
        mode:
          type: string
          example: VECTOR
        topK:
          type: integer
          minimum: 1
          maximum: 100
          example: 10
        scoreThreshold:
          type: number
          minimum: 0
          example: 0.35
        rerankTopN:
          type: integer
          minimum: 1
          nullable: true
    CreateKnowledgeBaseRequest:
      type: object
      required:
      - name
      properties:
        id:
          type: string
          description: Optional client-supplied ID for import or local integration workflows. Gateway implementations may ignore this field and generate an ID.
        name:
          type: string
        description:
          type: string
          default: ''
        docType:
          type: string
          example: GENERAL
        chunkStrategy:
          $ref: '#/components/schemas/ChunkStrategy'
        retrievalStrategy:
          $ref: '#/components/schemas/RetrievalStrategy'
    UpdateKnowledgeBaseRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        docType:
          type: string
          example: GENERAL
        chunkStrategy:
          $ref: '#/components/schemas/ChunkStrategy'
        retrievalStrategy:
          $ref: '#/components/schemas/RetrievalStrategy'
    KnowledgeBaseSummary:
      type: object
      required:
      - id
      - name
      - description
      - docType
      - chunkStrategy
      - retrievalStrategy
      - documentCount
      - chunkCount
      - createdAt
      - updatedAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        docType:
          type: string
        chunkStrategy:
          $ref: '#/components/schemas/ChunkStrategy'
        retrievalStrategy:
          $ref: '#/components/schemas/RetrievalStrategy'
        documentCount:
          type: integer
          minimum: 0
        chunkCount:
          type: integer
          minimum: 0
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    KnowledgeBaseResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/KnowledgeBaseSummary'
        requestId:
          type: string
    KnowledgeBaseListResponse:
      type: object
      required:
      - data
      - page
      - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeBaseSummary'
        page:
          $ref: '#/components/schemas/PageInfo'
        requestId:
          type: string
    DocumentStatus:
      type: string
      enum:
      - uploaded
      - parsing
      - chunking
      - embedding
      - ready
      - failed
    DocumentSummary:
      type: object
      required:
      - id
      - knowledgeBaseId
      - name
      - status
      - chunkCount
      - createdAt
      properties:
        id:
          type: string
        knowledgeBaseId:
          type: string
          description: Target knowledge base context for this document.
        name:
          type: string
        contentType:
          type: string
          nullable: true
        sizeBytes:
          type: integer
          minimum: 0
        status:
          $ref: '#/components/schemas/DocumentStatus'
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
          description: Processing failure summary. Must not include object keys, internal paths, SQL details, MinIO errors, or stack traces.
        chunkCount:
          type: integer
          minimum: 0
        tags:
          type: array
          items:
            type: string
        parserBackend:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        jobId:
          type: string
          nullable: true
          description: Ingestion job ID when a request starts or observes a processing job.
    UpdateDocumentRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
    DocumentResponse:
      type: object
      required:
      - data
      - requestId
      properties:
        data:
          $ref: '#/components/schemas/DocumentSummary'
        requestId:
          type: string
    DocumentListResponse:
      type: object
      required:
      - data
      - page
      - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        page:
          $ref: '#/components/schemas/PageInfo'
        requestId:
          type: string
    DocumentChunk:
      type: object
      required:
      - id
      - knowledgeBaseId
      - documentId
      - chunkIndex
      - content
      - tokenCount
      - createdAt
      properties:
        id:
          type: string
        knowledgeBaseId:
          type: string
        documentId:
          type: string
        chunkIndex:
          type: integer
          minimum: 0
        sectionPath:
          type: string
          nullable: true
        content:
          type: string
        tokenCount:
          type: integer
          minimum: 0
        chunkType:
          type: string
          nullable: true
        qdrantPointId:
          type: string
          nullable: true
        embeddingProvider:
          type: string
          nullable: true
        embeddingDimension:
          type: integer
          minimum: 1
          nullable: true
        embeddingPreview:
          type: array
          nullable: true
          items:
            type: number
        metadata:
          $ref: '#/components/schemas/JsonObject'
        createdAt:
          type: string
          format: date-time
    DocumentChunkListResponse:
      type: object
      required:
      - data
      - page
      - requestId
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DocumentChunk'
        page:
          $ref: '#/components/schemas/PageInfo'
        requestId:
          type: string
    KnowledgeQueryRequest:
      type: object
      required:
      - query
      properties:
        query:
          type: string
        knowledgeBaseIds:
          type: array
          items:
            type: string
        topK:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        scoreThreshold:
          type: number
          minimum: 0
          default: 0
        tags:
          type: array
          items:
            type: string
        metadataFilter:
          type: object
          additionalProperties:
            type: string
        rerank:
          type: boolean
          default: false
        rerankTopN:
          type: integer
          minimum: 1
          nullable: true
    KnowledgeQueryResult:
      type: object
      required:
      - score
      - knowledgeBaseId
