services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-demo-postgres-password}
      POSTGRES_DB: postgres
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_local_demo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-demo-password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_local_demo}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-local-demo-password}
    entrypoint: ["/bin/sh"]
    command:
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing local/software-teamwork-local
    restart: "no"

  migrate-auth:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command: ["-dir", "/migrations", "postgres", "postgres://auth_app:auth_app_dev@postgres:5432/auth_system?sslmode=disable", "up"]
    volumes:
      - ../services/auth/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-file:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command: ["-dir", "/migrations", "postgres", "postgres://file_app:file_app_dev@postgres:5432/file_system?sslmode=disable", "up"]
    volumes:
      - ../services/file/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-knowledge:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command: ["-dir", "/migrations", "postgres", "postgres://knowledge_app:knowledge_app_dev@postgres:5432/knowledge_system?sslmode=disable", "up"]
    volumes:
      - ../services/knowledge/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-qa:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command: ["-dir", "/migrations", "postgres", "postgres://qa_app:qa_app_dev@postgres:5432/qa_system?sslmode=disable", "up"]
    volumes:
      - ../services/qa/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-document:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command: ["-dir", "/migrations", "postgres", "postgres://document_app:document_app_dev@postgres:5432/document_system?sslmode=disable", "up"]
    volumes:
      - ../services/document/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-ai-gateway:
    profiles: ["ai"]
    build:
      context: .
      dockerfile: Dockerfile.migrate
    command: ["-dir", "/migrations", "postgres", "postgres://ai_gateway_app:ai_gateway_app_dev@postgres:5432/ai_gateway_system?sslmode=disable", "up"]
    volumes:
      - ../services/ai-gateway/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed-local:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-local-demo-postgres-password}
    command: ["sh", "-c", "psql -v ON_ERROR_STOP=1 -h postgres -U postgres -d postgres -f /seeds/001-local-demo-seed.sql"]
    volumes:
      - ./seeds:/seeds:ro
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
      migrate-knowledge:
        condition: service_completed_successfully
      migrate-document:
        condition: service_completed_successfully
    restart: "no"

  seed-local-ai:
    profiles: ["ai"]
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-local-demo-postgres-password}
    command: ["sh", "-c", "psql -v ON_ERROR_STOP=1 -h postgres -U postgres -d postgres -f /seeds/002-ai-gateway-model-profiles.sql"]
    volumes:
      - ./seeds:/seeds:ro
    depends_on:
      seed-local:
        condition: service_completed_successfully
      migrate-ai-gateway:
        condition: service_completed_successfully
    restart: "no"

  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    environment:
      AUTH_HTTP_ADDR: :8001
      AUTH_ENV: local
      AUTH_DATABASE_URL: postgres://auth_app:auth_app_dev@postgres:5432/auth_system?sslmode=disable
      AUTH_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-change-me}
      AUTH_TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:-local-demo-token-hash-secret-change-me}
      AUTH_TOKEN_HASH_KEY_VERSION: v1
      AUTH_DEFAULT_ROLE_CODE: standard
      AUTH_SESSION_TTL: 24h
    ports:
      - "${AUTH_HTTP_PORT:-8001}:8001"
    depends_on:
      migrate-auth:
        condition: service_completed_successfully
      seed-local:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8001/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  file:
    build:
      context: ../services/file
      dockerfile: Dockerfile
    environment:
      FILE_HTTP_ADDR: :8082
      FILE_DATABASE_URL: postgres://file_app:file_app_dev@postgres:5432/file_system?sslmode=disable
      FILE_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-change-me}
      FILE_STORAGE_BACKEND: local
      FILE_LOCAL_STORAGE_DIR: /data/file-storage
      FILE_MAX_UPLOAD_BYTES: 33554432
    ports:
      - "${FILE_HTTP_PORT:-8082}:8082"
    volumes:
      - file_data:/data/file-storage
    depends_on:
      migrate-file:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8082/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  knowledge:
    build:
      context: ../services/knowledge
      dockerfile: Dockerfile
    environment:
      KNOWLEDGE_HTTP_ADDR: :8083
      KNOWLEDGE_ENV: local
      KNOWLEDGE_SERVICE_VERSION: local
      DATABASE_URL: postgres://knowledge_app:knowledge_app_dev@postgres:5432/knowledge_system?sslmode=disable
      FILE_SERVICE_BASE_URL: http://file:8082
      KNOWLEDGE_REDIS_ADDR: redis:6379
      KNOWLEDGE_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-change-me}
    ports:
      - "${KNOWLEDGE_HTTP_PORT:-8083}:8083"
    depends_on:
      migrate-knowledge:
        condition: service_completed_successfully
      file:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed-local:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8083/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  qa:
    build:
      context: ../services/qa
      dockerfile: Dockerfile
    environment:
      QA_HTTP_ADDR: :8084
      QA_DATABASE_URL: postgres://qa_app:qa_app_dev@postgres:5432/qa_system?sslmode=disable
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-change-me}
      KNOWLEDGE_SERVICE_URL: http://knowledge:8083
      AI_GATEWAY_URL: http://ai-gateway:8086/internal/v1/chat/completions
      AI_GATEWAY_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-change-me}
      AI_GATEWAY_TOKEN_HEADER: X-Service-Token
      MODEL_ID: ${MODEL_ID:-local-placeholder-chat}
      MCP_TRANSPORT: disabled
      QA_CONFIG_ENCRYPTION_KEY: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
      AGENT_WORKDIR: /workspace
    ports:
      - "${QA_HTTP_PORT:-8084}:8084"
    volumes:
      - qa_workspace:/workspace
    depends_on:
      migrate-qa:
        condition: service_completed_successfully
      knowledge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8084/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  document:
    build:
      context: ../services/document
      dockerfile: Dockerfile
    environment:
      DOCUMENT_HTTP_ADDR: :8085
      DOCUMENT_DATABASE_URL: postgres://document_app:document_app_dev@postgres:5432/document_system?sslmode=disable
      DOCUMENT_REDIS_ADDR: redis:6379
      DOCUMENT_FILE_SERVICE_URL: http://file:8082
      DOCUMENT_FILE_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-change-me}
      DOCUMENT_AI_GATEWAY_URL: http://ai-gateway:8086
      DOCUMENT_AI_GATEWAY_PROFILE_ID: default-chat
      DOCUMENT_AI_GATEWAY_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-change-me}
      DOCUMENT_PANDOC_PATH: pandoc
      DOCUMENT_LIBREOFFICE_PATH: soffice
    ports:
      - "${DOCUMENT_HTTP_PORT:-8085}:8085"
    depends_on:
      migrate-document:
        condition: service_completed_successfully
      file:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed-local:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8085/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  ai-gateway:
    profiles: ["ai"]
    build:
      context: ../services/ai-gateway
      dockerfile: Dockerfile
    environment:
      AI_GATEWAY_HTTP_ADDR: :8086
      AI_GATEWAY_DATABASE_URL: postgres://ai_gateway_app:ai_gateway_app_dev@postgres:5432/ai_gateway_system?sslmode=disable
      AI_GATEWAY_SERVICE_TOKEN_HASHES: ${AI_GATEWAY_SERVICE_TOKEN_HASHES:-sha256:26c6719c056dabe8530ea09f1e8f7593cbcf98a060731c0fc786a5eb48e71ce7}
      AI_GATEWAY_SECRET_MODE: encrypted_column
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY_REF:-local-demo-key-v1}
      AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY: ${AI_GATEWAY_CREDENTIAL_ENCRYPTION_KEY:-local-demo-credential-key-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${AI_GATEWAY_HTTP_PORT:-8086}:8086"
    depends_on:
      migrate-ai-gateway:
        condition: service_completed_successfully
      seed-local-ai:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8086/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    environment:
      GATEWAY_HTTP_ADDR: :8080
      GATEWAY_ENV: local
      GATEWAY_CORS_ALLOWED_ORIGINS: ${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      GATEWAY_CORS_ALLOWED_METHODS: GET,POST,PATCH,DELETE,OPTIONS
      GATEWAY_CORS_ALLOWED_HEADERS: Authorization,Content-Type,X-Request-Id
      GATEWAY_REDIS_ADDR: redis:6379
      GATEWAY_TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET:-local-demo-token-hash-secret-change-me}
      GATEWAY_TOKEN_HASH_KEY_VERSION: v1
      GATEWAY_INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token-change-me}
      GATEWAY_AUTH_BASE_URL: http://auth:8001
      GATEWAY_KNOWLEDGE_BASE_URL: http://knowledge:8083
      GATEWAY_QA_BASE_URL: http://qa:8084
      GATEWAY_DOCUMENT_BASE_URL: http://document:8085
      GATEWAY_AI_GATEWAY_BASE_URL: http://ai-gateway:8086
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    depends_on:
      auth:
        condition: service_healthy
      knowledge:
        condition: service_healthy
      qa:
        condition: service_healthy
      document:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  file_data:
  qa_workspace:
